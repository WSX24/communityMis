<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的订单 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  .orders-header {
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(180deg, var(--fg) 0%, oklch(22% 0.02 80) 100%);
    color: #fff; padding: var(--space-xl) var(--space-lg) var(--space-lg);
    position: relative; overflow: hidden;
  }
  .orders-header::before {
    content: ''; position: absolute; top: -50px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, oklch(54% 0.15 28 / 0.1), transparent 70%);
  }
  .orders-header-top {
    display: flex; align-items: center; gap: var(--space-md);
    margin-bottom: var(--space-lg); position: relative; z-index: 1;
  }
  .orders-back {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    background: rgba(255,255,255,0.12); display: flex; align-items: center;
    justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .orders-back:hover { background: rgba(255,255,255,0.22); }
  .orders-title { flex: 1; font-family: var(--font-display); font-size: 20px; font-weight: 700; }

  .orders-header .order-stats {
    display: flex; gap: var(--space-3xl); position: relative; z-index: 1;
  }
  .order-stats .ostat { text-align: center; }
  .order-stats .ostat .ostat-num {
    font-family: var(--font-mono); font-size: 28px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .order-stats .ostat .ostat-lbl { font-size: 11px; opacity: 0.55; margin-top: 2px; }

  /* Tabs */
  .orders-tabs {
    display: flex; gap: 0; margin: 0 var(--space-lg); background: var(--border-light);
    border-radius: var(--radius-md); padding: 4px;
    position: sticky; top: 0; z-index: 51;
  }
  .orders-tabs button {
    flex: 1; padding: 10px 12px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s;
  }
  .orders-tabs button.active {
    background: var(--surface); color: var(--fg); font-weight: 600; box-shadow: var(--shadow-sm);
  }

  .orders-list {
    padding: var(--space-lg); padding-bottom: calc(var(--bottom-nav-height) + var(--space-2xl));
  }
  @media (min-width: 1024px) {
    .orders-list { max-width: 680px; margin: 0 auto; padding-bottom: var(--space-4xl); }
  }

  /* Order card */
  .order-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-lg);
    margin-bottom: var(--space-md); transition: box-shadow 0.2s; cursor: pointer;
  }
  .order-card:hover { box-shadow: var(--shadow-sm); }

  .order-card .oc-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: var(--space-sm);
  }
  .order-card .oc-title {
    font-size: 16px; font-weight: 700; flex: 1; margin-right: var(--space-md); line-height: 1.35;
  }
  .order-card .oc-id {
    font-size: 11px; color: var(--muted); font-family: var(--font-mono);
    margin-bottom: var(--space-sm);
  }
  .order-card .oc-people {
    display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md);
    font-size: 13px; color: var(--muted);
  }
  .order-card .oc-people .oc-arrow { color: var(--border); }
  .order-card .oc-meta {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: var(--space-md); border-top: 1px solid var(--border-light);
  }
  .order-card .oc-meta-left {
    display: flex; align-items: center; gap: var(--space-md);
    font-size: 13px; color: var(--muted);
  }
  .order-card .oc-amount {
    font-family: var(--font-mono); font-size: 16px; font-weight: 700;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }

  /* Status badges */
  .status-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .status-pill .sp-dot { width: 7px; height: 7px; border-radius: var(--radius-full); }
  .status-pending  { background: oklch(94% 0.04 75); color: oklch(55% 0.15 75); }
  .status-pending .sp-dot { background: oklch(55% 0.15 75); }
  .status-accepted { background: oklch(94% 0.04 200); color: oklch(50% 0.12 200); }
  .status-accepted .sp-dot { background: oklch(50% 0.12 200); }
  .status-settling { background: oklch(93% 0.03 175); color: oklch(48% 0.12 175); }
  .status-settling .sp-dot { background: oklch(48% 0.12 175); }
  .status-done { background: var(--success-light); color: var(--success); }
  .status-done .sp-dot { background: var(--success); }
  .status-disputed { background: var(--danger-light); color: var(--danger); }
  .status-disputed .sp-dot { background: var(--danger); }
  .status-cancelled { background: var(--border-light); color: var(--muted); }
  .status-cancelled .sp-dot { background: var(--muted); }

  /* Empty */
  .orders-empty {
    text-align: center; padding: var(--space-4xl) var(--space-xl); color: var(--muted);
  }
  .orders-empty svg { width: 56px; height: 56px; opacity: 0.25; margin-bottom: var(--space-lg); }
  .orders-empty p { font-size: 15px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  @media (max-width: 480px) {
    .orders-header .order-stats { gap: var(--space-xl); }
    .order-stats .ostat .ostat-num { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="orders-header">
  <div class="orders-header-top">
    <button class="orders-back" onclick="history.back()" aria-label="返回">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="orders-title">我的订单</div>
  </div>
  <div class="order-stats">
    <div class="ostat">
      <div class="ostat-num" id="stat-pending">2</div>
      <div class="ostat-lbl">进行中</div>
    </div>
    <div class="ostat">
      <div class="ostat-num" id="stat-done">8</div>
      <div class="ostat-lbl">已完成</div>
    </div>
    <div class="ostat">
      <div class="ostat-num" id="stat-disputed">1</div>
      <div class="ostat-lbl">争议中</div>
    </div>
  </div>
</div>

<div class="orders-tabs" id="orders-tabs">
  <button class="active" data-panel="all">全部</button>
  <button data-panel="posted">我发布的</button>
  <button data-panel="accepted">我接的</button>
</div>

<div class="orders-list">

  <!-- Panel: ALL orders -->
  <div class="tab-panel active" id="panel-all" data-filter="all"></div>

  <!-- Panel: Posted by me -->
  <div class="tab-panel" id="panel-posted" data-filter="posted"></div>

  <!-- Panel: Accepted by me -->
  <div class="tab-panel" id="panel-accepted" data-filter="accepted"></div>

</div>

<script>
  // Order data
  var orders = [
    { id: 'ORD-240603-042', title: '帮李阿姨代购日用品', status: 'done', myRole:'accepted', counterparty:'李阿姨', amount: 35.00, time: '2024-06-03', canConfirm:false, canReview:true },
    { id: 'ORD-240603-041', title: '请小王帮忙遛狗', status: 'done', myRole:'posted', counterparty:'小王', amount: 20.00, time: '2024-06-03', canConfirm:false, canReview:true },
    { id: 'ORD-240602-039', title: '帮赵姐组装书柜', status: 'done', myRole:'accepted', counterparty:'赵姐', amount: 45.00, time: '2024-06-02', canConfirm:false, canReview:true },
    { id: 'ORD-240601-038', title: '请陈师傅修水龙头', status: 'done', myRole:'posted', counterparty:'陈师傅', amount: 30.00, time: '2024-06-01', canConfirm:false, canReview:true },
    { id: 'ORD-240530-036', title: '代取快递送到 5 号楼', status: 'done', myRole:'accepted', counterparty:'刘姐', amount: 10.00, time: '2024-05-30', canConfirm:false, canReview:false },
    { id: 'ORD-240528-035', title: '帮忙搬矿泉水到 7 楼', status: 'done', myRole:'accepted', counterparty:'物业', amount: 12.00, time: '2024-05-28', canConfirm:false, canReview:false },
    { id: 'ORD-240526-034', title: '请邻居帮忙打扫阳台', status: 'done', myRole:'posted', counterparty:'小陈', amount: 25.00, time: '2024-05-26', canConfirm:false, canReview:false },
    { id: 'ORD-240524-032', title: '辅导初三数学 2 小时', status: 'disputed', myRole:'accepted', counterparty:'张姐', amount: 40.00, time: '2024-05-24', canConfirm:false, canDispute:true, disputeId:'DSP-240528-003' },
    { id: 'ORD-240650-048', title: '帮忙更换厨房水龙头', status: 'accepted', myRole:'posted', counterparty:'刘师傅', amount: 45.00, time: '2024-06-04', canConfirm:true, canCancel:true },
    { id: 'ORD-240651-049', title: '代取宠物医院药', status: 'pending', myRole:'posted', counterparty:'—', amount: 25.00, time: '2024-06-04', canCancel:true }
  ];

  function statusLabel(s) {
    var map = { pending:'待接单', accepted:'已接单', settling:'待结算', done:'已完成', disputed:'争议中', cancelled:'已取消' };
    return map[s] || s;
  }
  function statusClass(s) {
    return 'status-' + s;
  }

  function renderOrders(filter) {
    var filtered = orders;
    if (filter === 'posted') filtered = orders.filter(function(o){ return o.myRole === 'posted'; });
    if (filter === 'accepted') filtered = orders.filter(function(o){ return o.myRole === 'accepted'; });

    var panelId = 'panel-' + filter;
    var panel = document.getElementById(panelId);
    if (!panel) return;

    if (filtered.length === 0) {
      panel.innerHTML = '<div class="orders-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><p>暂无订单</p></div>';
      return;
    }

    panel.innerHTML = filtered.map(function(o) {
      var stat = statusLabel(o.status);
      var sclass = statusClass(o.status);
      var roleTag = o.myRole === 'posted' ? '发布' : '接单';
      var roleBg = o.myRole === 'posted' ? 'var(--accent-subtle)' : 'var(--secondary-light)';
      var roleColor = o.myRole === 'posted' ? 'var(--accent)' : 'var(--secondary)';

      var actions = '';
      if (o.canConfirm) {
        actions = '<button class="btn btn--primary btn--sm confirm-btn" data-id="' + o.id + '" onclick="event.stopPropagation();confirmOrder(\'' + o.id + '\')">确认完成</button>';
      } else if (o.canReview) {
        actions = '<button class="btn btn--outline btn--sm" onclick="event.stopPropagation();location.href=\'review.html?order=' + o.id + '\'">去评价</button>';
      } else if (o.canCancel) {
        actions = '<button class="btn btn--ghost btn--sm" onclick="event.stopPropagation();cancelOrder(\'' + o.id + '\')">取消</button>';
      } else if (o.canDispute && o.disputeId) {
        actions = '<button class="btn btn--sm" style="border:1.5px solid var(--danger);color:var(--danger);" onclick="event.stopPropagation();location.href=\'dispute-detail.html?id=' + o.disputeId + '\'">查看纠纷</button>';
      }

      return '<div class="order-card" onclick="location.href=\'order-detail.html?id=' + o.id + '\'">' +
        '<div class="oc-top">' +
          '<span class="oc-title">' + o.title + '</span>' +
          '<span class="status-pill ' + sclass + '"><span class="sp-dot"></span>' + stat + '</span>' +
        '</div>' +
        '<div class="oc-id">#' + o.id + '</div>' +
        '<div class="oc-people">' +
          '<span style="font-size:11px;padding:2px 8px;border-radius:var(--radius-full);background:' + roleBg + ';color:' + roleColor + ';font-weight:600;">' + roleTag + '</span>' +
          '<span>' + (o.myRole==='posted'?'服务方：':'需求方：') + o.counterparty + '</span>' +
        '</div>' +
        '<div class="oc-meta">' +
          '<div class="oc-meta-left"><span>' + o.time + '</span></div>' +
          '<span class="oc-amount">⏂ ' + o.amount.toFixed(2) + '</span>' +
        '</div>' +
        (actions ? '<div style="margin-top:var(--space-md);text-align:right;">' + actions + '</div>' : '') +
      '</div>';
    }).join('');
  }

  function renderAll() {
    document.querySelectorAll('.tab-panel').forEach(function(p) {
      renderOrders(p.dataset.filter);
    });
  }

  // Tab switching
  document.querySelectorAll('#orders-tabs button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#orders-tabs button').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      var panelId = this.dataset.panel;
      document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
      document.getElementById('panel-' + panelId).classList.add('active');
    });
  });

  function confirmOrder(id) {
    var btn = document.querySelector('.confirm-btn[data-id="' + id + '"]');
    if (btn) {
      btn.textContent = '已确认 ✓';
      btn.classList.remove('btn--primary');
      btn.classList.add('btn--secondary');
      btn.disabled = true;
      btn.style.pointerEvents = 'none';
    }
  }

  function cancelOrder(id) {
    if (confirm('确定取消该订单吗？取消后无法恢复。')) {
      orders = orders.filter(function(o){ return o.id !== id; });
      renderAll();
    }
  }

  renderAll();
</script>

  <span class="fab-pulse"></span>
</button>

<nav class="bottom-nav">

</body>
</html>
