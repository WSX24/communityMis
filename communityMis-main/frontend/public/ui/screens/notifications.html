<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通知中心 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  .notif-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: oklch(97% 0.005 85 / 0.9);
    border-bottom: 1px solid var(--border-light);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-inner {
    width: min(100%, 980px);
    margin: 0 auto;
    padding: var(--space-lg);
    display: grid;
    gap: var(--space-md);
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
  }

  .title-wrap {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    min-width: 0;
  }

  .back-btn {
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border-radius: var(--radius-full);
    color: var(--muted);
    transition: color 0.15s, background 0.15s;
  }

  .back-btn:hover {
    color: var(--accent);
    background: var(--border-light);
  }

  .title-wrap h1 {
    font-family: var(--font-display);
    font-size: clamp(24px, 4vw, 32px);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .title-wrap p {
    margin-top: 3px;
    color: var(--muted);
    font-size: 13px;
  }

  .mark-read {
    min-height: 40px;
    padding: 0 var(--space-lg);
    border-radius: var(--radius-full);
    background: var(--surface);
    border: 1px solid var(--border-light);
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .mark-read:hover {
    color: var(--accent);
    border-color: var(--accent-light);
    background: var(--accent-subtle);
  }

  .filter-row {
    display: flex;
    gap: var(--space-sm);
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .filter-row::-webkit-scrollbar {
    display: none;
  }

  .notif-shell {
    width: min(100%, 980px);
    margin: 0 auto;
    padding: var(--space-xl) var(--space-lg) calc(var(--bottom-nav-height) + var(--space-3xl));
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    gap: var(--space-xl);
    align-items: start;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--space-md);
    grid-column: 1 / -1;
  }

  .summary-card {
    padding: var(--space-lg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--surface);
  }

  .summary-card strong {
    display: block;
    font-family: var(--font-display);
    font-size: 26px;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .summary-card span {
    display: block;
    margin-top: 5px;
    color: var(--muted);
    font-size: 12px;
  }

  .notif-list {
    display: grid;
    gap: var(--space-md);
  }

  .notif-card {
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: var(--space-md);
    align-items: flex-start;
    padding: var(--space-lg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--surface);
    transition: box-shadow 0.18s, border-color 0.18s, opacity 0.18s;
  }

  .notif-card:hover {
    box-shadow: var(--shadow-sm);
    border-color: var(--border);
  }

  .notif-card.unread::before {
    content: "";
    position: absolute;
    left: -1px;
    top: var(--space-lg);
    bottom: var(--space-lg);
    width: 4px;
    border-radius: var(--radius-full);
    background: var(--accent);
  }

  .notif-card.hidden {
    display: none;
  }

  .notif-card.read {
    opacity: 0.72;
  }

  .notif-icon {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border-radius: var(--radius-md);
  }

  .notif-icon svg {
    width: 21px;
    height: 21px;
  }

  .notif-main {
    min-width: 0;
  }

  .notif-title {
    margin-bottom: 5px;
    font-size: 15px;
    font-weight: 800;
    line-height: 1.45;
  }

  .notif-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .notif-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-top: var(--space-md);
  }

  .time {
    color: var(--muted);
    font-size: 12px;
  }

  .notif-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .small-action {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .small-action:hover {
    color: var(--accent);
    border-color: var(--accent-light);
    background: var(--accent-subtle);
  }

  .side-stack {
    display: grid;
    gap: var(--space-lg);
  }

  .panel {
    padding: var(--space-lg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--surface);
  }

  .panel h2 {
    margin-bottom: var(--space-md);
    font-family: var(--font-display);
    font-size: 19px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .digest-list {
    display: grid;
    gap: var(--space-md);
  }

  .digest-row {
    display: grid;
    gap: 2px;
    padding-bottom: var(--space-md);
    border-bottom: 1px solid var(--border-light);
  }

  .digest-row:last-child {
    padding-bottom: 0;
    border-bottom: 0;
  }

  .digest-row strong {
    font-size: 13px;
  }

  .digest-row span {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--border-light);
  }

  .setting-row:last-child {
    border-bottom: 0;
  }

  .setting-row strong {
    display: block;
    font-size: 13px;
  }

  .setting-row span {
    color: var(--muted);
    font-size: 12px;
  }

  .switch {
    position: relative;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
    border-radius: var(--radius-full);
    background: var(--border);
    transition: background 0.18s;
  }

  .switch::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: var(--radius-full);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s;
  }

  .switch.on {
    background: var(--accent);
  }

  .switch.on::after {
    transform: translateX(18px);
  }

  .empty-state {
    display: none;
    padding: var(--space-4xl) var(--space-lg);
    text-align: center;
    color: var(--muted);
  }

  .empty-state.show {
    display: block;
  }

  @media (min-width: 1024px) {
    .bottom-nav {
      display: none;
    }
  }

  @media (max-width: 860px) {
    .notif-shell {
      grid-template-columns: 1fr;
    }

    .summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 560px) {
    .header-inner,
    .notif-shell {
      padding-inline: var(--space-md);
    }

    .mark-read {
      padding-inline: var(--space-md);
    }

    .mark-read .wide-label {
      display: none;
    }

    .summary-grid {
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
    }

    .notif-card {
      grid-template-columns: auto 1fr;
    }

    .notif-actions {
      grid-column: 2;
      justify-content: flex-start;
    }
  }
</style>
</head>
<body>

<header class="notif-header">
  <div class="header-inner">
    <div class="top-row">
      <div class="title-wrap">
        <a class="back-btn" href="feed.html" aria-label="返回首页">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div>
          <h1>通知中心</h1>
          <p>订单、纠纷、评价、AI 反馈和系统公告集中在这里。</p>
        </div>
      </div>
      <button class="mark-read" id="mark-all-read">全部<span class="wide-label">标为已读</span></button>
    </div>
    <div class="filter-row" id="filter-row" aria-label="通知分类">
      <button class="chip active" data-filter="all">全部</button>
      <button class="chip" data-filter="order">订单</button>
      <button class="chip" data-filter="dispute">纠纷</button>
      <button class="chip" data-filter="coin">时间币</button>
      <button class="chip" data-filter="ai">AI 反馈</button>
      <button class="chip" data-filter="social">互动</button>
      <button class="chip" data-filter="system">系统</button>
    </div>
  </div>
</header>

<main class="notif-shell">
  <section class="summary-grid" aria-label="通知概览">
    <div class="summary-card"><strong id="unread-count">5</strong><span>未读通知</span></div>
    <div class="summary-card"><strong>2</strong><span>待处理订单</span></div>
    <div class="summary-card"><strong>1</strong><span>纠纷更新</span></div>
    <div class="summary-card"><strong>3</strong><span>今日互动</span></div>
  </section>

  <section aria-label="通知列表">
    <div class="notif-list" id="notif-list">
<div data-runtime-placeholder class="runtime-placeholder">正在加载真实通知。</div>
</div>

    <div class="empty-state" id="empty-state">
      <p>当前分类暂无通知</p>
    </div>
  </section>

  <aside class="side-stack">
    <section class="panel">
      <h2>今日摘要</h2>
      <div class="digest-list">
<div data-runtime-placeholder class="runtime-placeholder">正在加载今日摘要。</div>
</div>
    </section>

    <section class="panel">
      <h2>通知偏好</h2>
      <div class="setting-row">
        <div><strong>订单进度</strong><span>接单、截止、确认完成</span></div>
        <button class="switch on" aria-label="订单进度通知"></button>
      </div>
      <div class="setting-row">
        <div><strong>纠纷与陪审</strong><span>证据、投票、裁决更新</span></div>
        <button class="switch on" aria-label="纠纷与陪审通知"></button>
      </div>
      <div class="setting-row">
        <div><strong>互动提醒</strong><span>点赞、评论、关注</span></div>
        <button class="switch on" aria-label="互动提醒通知"></button>
      </div>
      <div class="setting-row">
        <div><strong>AI 反馈</strong><span>筛选结果、草稿生成</span></div>
        <button class="switch" aria-label="AI 反馈通知"></button>
      </div>
    </section>
  </aside>
</main>

<button class="ai-fab" aria-label="AI 助手" onclick="openAIModal('rules')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 0 1 7.1 4.23l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  <span class="fab-pulse"></span>
</button>

<nav class="bottom-nav">
  <a href="feed.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    首页
  </a>
  <a href="tasks.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    任务
  </a>
  <a href="post.html" class="publish-btn" aria-label="发布">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </a>
  <a href="messages.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    消息
  </a>
  <a href="profile.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    我的
  </a>
</nav>

<script src="../js/ai-modal.js"></script>
<script>
  const filterButtons = document.querySelectorAll('#filter-row .chip');
  const notifCards = Array.from(document.querySelectorAll('.notif-card'));
  const emptyState = document.getElementById('empty-state');
  const unreadCount = document.getElementById('unread-count');

  function updateUnreadCount() {
    unreadCount.textContent = document.querySelectorAll('.notif-card.unread').length;
  }

  function applyFilter(type) {
    let visible = 0;
    notifCards.forEach(card => {
      const show = type === 'all' || card.dataset.type === type;
      card.classList.toggle('hidden', !show);
      if (show) visible += 1;
    });
    emptyState.classList.toggle('show', visible === 0);
  }

  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      filterButtons.forEach(item => item.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.filter);
    });
  });

  document.querySelectorAll('.read-one').forEach(btn => {
    btn.addEventListener('click', event => {
      event.preventDefault();
      event.stopPropagation();
      const card = btn.closest('.notif-card');
      card.classList.remove('unread');
      card.classList.add('read');
      updateUnreadCount();
    });
  });

  document.getElementById('mark-all-read').addEventListener('click', () => {
    notifCards.forEach(card => {
      card.classList.remove('unread');
      card.classList.add('read');
    });
    updateUnreadCount();
  });

  document.querySelectorAll('.switch').forEach(sw => {
    sw.addEventListener('click', () => sw.classList.toggle('on'));
  });

  notifCards.forEach(card => {
    card.addEventListener('click', event => {
      if (event.target.closest('a, button')) return;
      card.classList.remove('unread');
      card.classList.add('read');
      updateUnreadCount();
      window.location.href = card.dataset.href;
    });
  });

  updateUnreadCount();
</script>
</body>
</html>
