<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>纠纷详情 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  .dd-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 1px solid var(--border-light);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md);
  }
  .dd-back {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    background: var(--border-light); display: flex; align-items: center;
    justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .dd-back:hover { background: var(--border); }
  .dd-title { flex: 1; font-family: var(--font-display); font-size: 18px; font-weight: 700; }

  .dd-body {
    padding: var(--space-lg); padding-bottom: calc(var(--bottom-nav-height) + var(--space-2xl));
    max-width: 720px; margin: 0 auto;
  }
  @media (min-width: 1024px) { .dd-body { padding-bottom: var(--space-4xl); } }

  /* Status banner */
  .status-banner {
    padding: var(--space-lg); border-radius: var(--radius-lg); margin-bottom: var(--space-lg);
    display: flex; align-items: flex-start; gap: var(--space-md);
  }
  .status-banner.in-progress {
    background: var(--warning-light); border: 1px solid oklch(90% 0.04 75);
  }
  .status-banner.resolved {
    background: var(--success-light); border: 1px solid oklch(88% 0.04 155);
  }
  .status-banner .sb-icon { width: 24px; height: 24px; flex-shrink: 0; margin-top: 1px; }
  .status-banner .sb-text { flex: 1; }
  .status-banner .sb-text h4 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .status-banner .sb-text p { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Info card */
  .dd-info {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-xl); margin-bottom: var(--space-lg);
  }
  .dd-info .dd-no { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-bottom: var(--space-sm); }
  .dd-info .dd-dispute-title { font-size: 18px; font-weight: 700; margin-bottom: var(--space-md); }
  .dd-info .dd-meta-row {
    display: flex; flex-wrap: wrap; gap: var(--space-xl);
    font-size: 13px; color: var(--muted);
  }
  .dd-info .dd-meta-row span { display: flex; align-items: center; gap: 4px; }

  /* Evidence panels — side by side */
  .evidence-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg);
    margin: var(--space-lg) 0;
  }
  .ev-panel {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); overflow: hidden;
  }
  .ev-panel .ev-panel-header {
    padding: var(--space-lg); border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; gap: var(--space-md);
  }
  .ev-panel .ev-panel-header .ev-party-role {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ev-panel .ev-panel-body { padding: var(--space-lg); }
  .ev-panel .ev-claim {
    font-size: 14px; line-height: 1.65; margin-bottom: var(--space-lg);
  }
  .ev-panel .ev-files { display: flex; flex-direction: column; gap: var(--space-sm); }
  .ev-panel .ev-file-item {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--bg); font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .ev-panel .ev-file-item:hover { background: var(--border-light); }

  /* Timeline */
  .dd-timeline { margin: var(--space-lg) 0; }
  .dd-timeline h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--space-lg); }

  .dtl-step {
    display: flex; gap: var(--space-lg); padding-bottom: var(--space-xl);
    position: relative;
  }
  .dtl-step:last-child { padding-bottom: 0; }
  .dtl-step .dtl-node-wrap { display: flex; flex-direction: column; align-items: center; }
  .dtl-step .dtl-node {
    width: 28px; height: 28px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; z-index: 1; font-size: 13px;
  }
  .dtl-step .dtl-line {
    flex: 1; width: 2px; min-height: 16px; margin-top: 4px;
  }
  .dtl-step.event .dtl-node { background: var(--secondary-light); color: var(--secondary); }
  .dtl-step.event .dtl-line { background: var(--border-light); }
  .dtl-step.vote .dtl-node { background: var(--accent-subtle); color: var(--accent); }
  .dtl-step.vote .dtl-line { background: var(--border-light); }
  .dtl-step.ruling .dtl-node { background: var(--success-light); color: var(--success); }
  .dtl-step.ruling .dtl-line { background: var(--success-light); }

  .dtl-step .dtl-content { flex: 1; min-width: 0; padding-top: 2px; }
  .dtl-step .dtl-title { font-size: 14px; font-weight: 600; }
  .dtl-step .dtl-desc { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
  .dtl-step .dtl-time { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }

  /* Jury panel */
  .jury-panel {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-xl);
    margin: var(--space-lg) 0;
  }
  .jury-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--space-lg); }
  .jury-stats {
    display: flex; gap: var(--space-2xl); margin-bottom: var(--space-lg);
    padding-bottom: var(--space-lg); border-bottom: 1px solid var(--border-light);
  }
  .jury-stats .js-item { text-align: center; }
  .jury-stats .js-val { font-family: var(--font-mono); font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .jury-stats .js-val.for { color: var(--success); }
  .jury-stats .js-val.against { color: var(--danger); }
  .jury-stats .js-val.abstain { color: var(--muted); }
  .jury-stats .js-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .jury-list { display: flex; flex-direction: column; gap: var(--space-md); }
  .jury-member {
    display: flex; align-items: center; gap: var(--space-lg);
    padding: var(--space-md) 0; border-bottom: 1px solid var(--border-light);
  }
  .jury-member:last-child { border-bottom: none; }
  .jury-member .jm-info { flex: 1; min-width: 0; }
  .jury-member .jm-name { font-size: 14px; font-weight: 600; }
  .jury-member .jm-reason { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
  .jury-member .jm-vote {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
    border-radius: var(--radius-full); font-size: 12px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
  }
  .jm-vote.support { background: var(--success-light); color: var(--success); }
  .jm-vote.oppose { background: var(--danger-light); color: var(--danger); }
  .jm-vote.abstain { background: var(--border-light); color: var(--muted); }

  /* My vote */
  .my-vote-section {
    background: var(--accent-subtle); border-radius: var(--radius-lg);
    padding: var(--space-xl); margin: var(--space-lg) 0; text-align: center;
    border: 1.5px solid var(--accent-light);
  }
  .my-vote-section h4 { font-size: 15px; font-weight: 700; margin-bottom: var(--space-lg); }
  .my-vote-section .vote-btns { display: flex; gap: var(--space-md); justify-content: center; }
  .my-vote-section .vote-btn {
    padding: 12px 24px; border-radius: var(--radius-md); font-size: 14px;
    font-weight: 600; border: 2px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: var(--surface);
  }
  .my-vote-section .vote-btn:hover { border-color: var(--accent); }
  .my-vote-section .vote-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .my-vote-section .vote-btn.voted-support { background: var(--success-light); border-color: var(--success); color: var(--success); }
  .my-vote-section .vote-extra { margin-top: var(--space-lg); }
  .my-vote-section .vote-extra textarea {
    width: 100%; padding: 10px 14px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); font-size: 14px; line-height: 1.5;
    resize: vertical; min-height: 80px; font-family: var(--font-body);
    background: var(--surface); outline: none;
  }
  .my-vote-section .vote-extra textarea:focus { border-color: var(--accent); }

  /* Ruling card */
  .ruling-card {
    background: linear-gradient(135deg, oklch(96% 0.02 200), var(--surface));
    border: 2px solid var(--secondary); border-radius: var(--radius-lg);
    padding: var(--space-xl); margin: var(--space-lg) 0;
  }
  .ruling-card .ruling-header {
    display: flex; align-items: center; gap: var(--space-md);
    margin-bottom: var(--space-lg); padding-bottom: var(--space-lg);
    border-bottom: 1px solid var(--border);
  }
  .ruling-card .admin-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: var(--radius-full);
    background: var(--secondary); color: #fff; font-size: 12px; font-weight: 700;
  }
  .ruling-card .ruling-body { font-size: 14px; line-height: 1.7; }
  .ruling-card .ruling-verdict {
    font-size: 18px; font-weight: 700; margin: var(--space-lg) 0;
  }
  .ruling-card .ruling-verdict .verdict-label { font-size: 12px; color: var(--muted); }
  .ruling-card .ruling-detail { font-size: 14px; color: var(--muted); line-height: 1.7; }
  .ruling-card .ruling-meta {
    font-size: 12px; color: var(--muted); margin-top: var(--space-lg);
    font-family: var(--font-mono);
  }

  /* AI Summary */
  .ai-summary-card {
    background: linear-gradient(135deg, oklch(96% 0.02 200), var(--surface));
    border: 1.5px solid var(--secondary-light); border-radius: var(--radius-lg);
    padding: var(--space-lg); margin: var(--space-lg) 0;
  }
  .ai-summary-card .ai-header {
    display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md);
  }
  .ai-summary-card .ai-badge {
    font-size: 11px; padding: 3px 10px; border-radius: var(--radius-full);
    background: var(--secondary); color: #fff; font-weight: 600;
  }
  .ai-summary-card .ai-content { font-size: 14px; line-height: 1.7; color: var(--muted); }
  .ai-summary-card .ai-content strong { color: var(--fg); display: block; margin-top: var(--space-md); margin-bottom: var(--space-sm); }
  .ai-summary-card .ai-disclaimer {
    font-size: 11px; color: var(--muted); margin-top: var(--space-md);
    padding-top: var(--space-md); border-top: 1px dashed var(--border);
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .evidence-grid { grid-template-columns: 1fr; }
    .jury-stats { gap: var(--space-xl); }
    .my-vote-section .vote-btns { flex-direction: column; }
    .my-vote-section .vote-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="dd-header">
  <button class="dd-back" onclick="history.back()" aria-label="返回">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="dd-title">纠纷详情</div>
</div>

<div class="dd-body">
<div data-runtime-placeholder class="runtime-placeholder">正在加载真实纠纷详情。</div>
</div>

<script>
  var selectedVote = '';

  document.querySelectorAll('#vote-btns .vote-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#vote-btns .vote-btn').forEach(function(b) { b.classList.remove('selected'); });
      this.classList.add('selected');
      selectedVote = this.dataset.vote;
      document.getElementById('vote-reason-section').style.display = 'block';
      document.getElementById('cast-vote-btn').style.display = 'inline-flex';
    });
  });

  document.getElementById('cast-vote-btn').addEventListener('click', function() {
    this.textContent = '提交中…';
    this.disabled = true;

    setTimeout(function() {
      document.getElementById('vote-btns').style.display = 'none';
      document.getElementById('vote-reason-section').style.display = 'none';
      document.getElementById('cast-vote-btn').style.display = 'none';
      document.getElementById('vote-result').style.display = 'block';

      // Update stats
      var forEl = document.querySelector('.js-val.for');
      var currentFor = parseInt(forEl.textContent);
      forEl.textContent = currentFor + 1;
    }, 500);
  });
</script>
