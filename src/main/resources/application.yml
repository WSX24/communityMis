spring:
  profiles:
    active: dev  # 默认激活开发环境

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml  # Mapper XML 文件位置
  type-aliases-package: com.communitymis.entity  # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL语句（开发环境）
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1  # 已删除
      logic-not-delete-value: 0  # 未删除