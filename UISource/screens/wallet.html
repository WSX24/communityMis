<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>时间币钱包 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/common.css">
<style>
  /* ─── Wallet header bar ─── */
  .wallet-header {
    background: linear-gradient(180deg,
      oklch(22% 0.025 80) 0%,
      oklch(18% 0.018 80) 100%);
    color: #fff; padding: var(--space-xl) var(--space-lg) var(--space-3xl);
    position: relative; overflow: hidden;
  }

  .wallet-header::before {
    content: '';
    position: absolute; top: -60px; right: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, oklch(65% 0.18 82 / 0.12), transparent 70%);
  }

  .wallet-header::after {
    content: '';
    position: absolute; bottom: -30px; left: -30px;
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle, oklch(54% 0.15 28 / 0.10), transparent 70%);
  }

  .wallet-top-bar {
    display: flex; align-items: center; gap: var(--space-md);
    margin-bottom: var(--space-xl); position: relative; z-index: 1;
  }

  .wallet-back {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    background: rgba(255,255,255,0.12); display: flex;
    align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }

  .wallet-back:hover { background: rgba(255,255,255,0.22); }

  .wallet-title {
    flex: 1; font-family: var(--font-display);
    font-size: 20px; font-weight: 700;
  }

  .wallet-top-bar .icon-btn-circle {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    background: rgba(255,255,255,0.12); display: flex;
    align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }

  .wallet-top-bar .icon-btn-circle:hover { background: rgba(255,255,255,0.22); }

  /* Balance display */
  .balance-section {
    text-align: center; position: relative; z-index: 1;
    padding: var(--space-lg) 0;
  }

  .balance-label {
    font-size: 13px; opacity: 0.6; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: var(--space-sm);
  }

  .balance-amount {
    font-family: var(--font-mono);
    font-size: clamp(42px, 12vw, 56px); font-weight: 700;
    letter-spacing: -0.03em; line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .balance-amount .unit {
    font-size: 28px; font-weight: 500; opacity: 0.5;
    margin-right: 4px; letter-spacing: 0;
  }

  .balance-sub {
    font-size: 13px; opacity: 0.5; margin-top: 6px;
  }

  /* Quick stat chips */
  .quick-stats {
    display: flex; justify-content: center; gap: var(--space-2xl);
    margin-top: var(--space-xl); position: relative; z-index: 1;
  }

  .quick-stat {
    text-align: center;
  }

  .quick-stat .qs-val {
    font-family: var(--font-mono); font-size: 18px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .quick-stat .qs-val.income { color: oklch(70% 0.14 155); }
  .quick-stat .qs-val.expense { color: oklch(70% 0.12 28); }

  .quick-stat .qs-lbl {
    font-size: 11px; opacity: 0.5; margin-top: 2px;
  }

  .quick-stat .qs-divider {
    width: 1px; height: 32px; background: rgba(255,255,255,0.12);
  }

  /* Action row */
  .wallet-actions-row {
    display: flex; justify-content: center; gap: var(--space-md);
    margin-top: var(--space-xl); position: relative; z-index: 1;
  }

  .wallet-action-btn {
    padding: 10px 22px; border-radius: var(--radius-full);
    background: rgba(255,255,255,0.1); color: #fff;
    font-size: 14px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.12);
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }

  .wallet-action-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.25); }
  .wallet-action-btn:active { transform: scale(0.97); }

  .wallet-action-btn.primary-action {
    background: var(--accent); border-color: var(--accent);
  }

  .wallet-action-btn.primary-action:hover { background: var(--accent-hover); }

  .wallet-action-btn.freeze-link {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
  }

  /* ─── Transaction section ─── */
  .tx-section {
    margin-top: -var(--space-xl);
    position: relative; z-index: 2;
    background: var(--bg);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: var(--space-xl) var(--space-lg);
    min-height: 50dvh;
  }

  .tx-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-lg);
  }

  .tx-section-header h2 {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
  }

  /* Filter tabs */
  .tx-filter-tabs {
    display: flex; gap: 4px; padding: 4px;
    background: var(--border-light); border-radius: var(--radius-md);
  }

  .tx-filter-tabs button {
    padding: 7px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: all 0.15s;
  }

  .tx-filter-tabs button.active {
    background: var(--surface); color: var(--fg);
    box-shadow: var(--shadow-sm);
  }

  /* Transaction list */
  .tx-list { display: flex; flex-direction: column; }

  .tx-item {
    display: flex; align-items: flex-start; gap: var(--space-lg);
    padding: var(--space-lg) 0; border-bottom: 1px solid var(--border-light);
    transition: background 0.15s;
  }

  .tx-item:hover { background: oklch(99% 0.002 85 / 0.5); margin: 0 calc(-1 * var(--space-lg)); padding-left: var(--space-lg); padding-right: var(--space-lg); }

  .tx-icon {
    width: 42px; height: 42px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .tx-icon.income { background: var(--success-light); color: var(--success); }
  .tx-icon.expense { background: var(--accent-subtle); color: var(--accent); }
  .tx-icon.system { background: var(--border-light); color: var(--muted); }

  .tx-body { flex: 1; min-width: 0; }

  .tx-body .tx-title {
    font-size: 15px; font-weight: 600; margin-bottom: 2px;
  }

  .tx-body .tx-order-id {
    font-size: 12px; color: var(--muted);
    font-family: var(--font-mono);
  }

  .tx-body .tx-time {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }

  .tx-amount-cell { text-align: right; flex-shrink: 0; }

  .tx-amount-cell .tx-amount {
    font-family: var(--font-mono); font-size: 16px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .tx-amount-cell .tx-amount.income { color: var(--success); }
  .tx-amount-cell .tx-amount.expense { color: var(--accent); }
  .tx-amount-cell .tx-amount.system { color: var(--muted); }

  .tx-amount-cell .tx-balance {
    font-size: 12px; color: var(--muted); margin-top: 2px;
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; margin-top: var(--space-2xl); padding-bottom: var(--space-xl);
  }

  .pagination button {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: var(--muted);
    transition: all 0.15s;
  }

  .pagination button:hover { background: var(--border-light); color: var(--fg); }

  .pagination button.active {
    background: var(--accent); color: #fff;
  }

  .pagination button:disabled {
    opacity: 0.35; pointer-events: none;
  }

  .pagination .page-ellipsis {
    width: 38px; height: 38px; display: flex;
    align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted);
  }

  /* Empty state for filtered */
  .tx-empty {
    text-align: center; padding: var(--space-4xl) var(--space-xl);
    color: var(--muted);
  }

  .tx-empty svg { width: 56px; height: 56px; opacity: 0.25; margin-bottom: var(--space-lg); }

  /* Bottom spacing */
  .wallet-bottom-spacer {
    height: calc(var(--bottom-nav-height) + var(--space-2xl));
  }

  @media (min-width: 1024px) {
    .wallet-bottom-spacer { height: var(--space-4xl); }
    .tx-section {
      max-width: 700px; margin-left: auto; margin-right: auto;
      border-radius: var(--radius-xl); margin-top: -var(--space-xl);
      box-shadow: var(--shadow-md); padding: var(--space-3xl);
    }
  }

  @media (max-width: 480px) {
    .balance-amount { font-size: 42px; }
    .quick-stats { gap: var(--space-xl); }
    .wallet-actions-row { gap: var(--space-sm); }
    .wallet-action-btn { padding: 8px 16px; font-size: 13px; }
  }
</style>
</head>

<script src="../js/ai-modal.js"></script>
<script>
  /* ─── Transaction data ─── */
  var allTransactions = [
    { id: '#LB-20240603-0012', type: 'income', title: '帮李阿姨代购日用品', amount: '+35.00', balance: '286.50', orderId: 'ORD-240603-042', time: '2024-06-03 14:22' },
    { id: '#LB-20240603-0011', type: 'expense', title: '请小王帮忙遛狗', amount: '-20.00', balance: '251.50', orderId: 'ORD-240603-041', time: '2024-06-03 10:15' },
    { id: '#LB-20240602-0010', type: 'income', title: '帮赵姐组装书柜', amount: '+45.00', balance: '271.50', orderId: 'ORD-240602-039', time: '2024-06-02 16:48' },
    { id: '#LB-20240601-0009', type: 'expense', title: '请陈师傅修水龙头', amount: '-30.00', balance: '226.50', orderId: 'ORD-240601-038', time: '2024-06-01 09:30' },
    { id: '#LB-20240530-0008', type: 'income', title: '代取快递送到 5 号楼', amount: '+10.00', balance: '256.50', orderId: 'ORD-240530-036', time: '2024-05-30 18:05' },
    { id: '#LB-20240528-0007', type: 'income', title: '帮忙搬一箱矿泉水到 7 楼', amount: '+12.00', balance: '246.50', orderId: 'ORD-240528-035', time: '2024-05-28 11:42' },
    { id: '#LB-20240526-0006', type: 'expense', title: '请邻居帮忙打扫阳台', amount: '-25.00', balance: '234.50', orderId: 'ORD-240526-034', time: '2024-05-26 15:20' },
    { id: '#LB-20240524-0005', type: 'income', title: '辅导初三数学 2 小时', amount: '+40.00', balance: '259.50', orderId: 'ORD-240524-032', time: '2024-05-24 20:10' },
    { id: '#LB-20240522-0004', type: 'expense', title: '社区医院排队取报告单', amount: '-50.00', balance: '219.50', orderId: 'ORD-240522-030', time: '2024-05-22 08:55' },
    { id: '#LB-20240520-0003', type: 'income', title: '帮刘叔修电脑重装系统', amount: '+65.00', balance: '269.50', orderId: 'ORD-240520-028', time: '2024-05-20 13:30' },
    { id: '#LB-20240518-0002', type: 'income', title: '丰巢取件送到 3 号楼', amount: '+10.00', balance: '204.50', orderId: 'ORD-240518-025', time: '2024-05-18 17:15' },
    { id: '#LB-20240515-0001', type: 'income', title: '新用户注册奖励', amount: '+5.00', balance: '194.50', orderId: '—', time: '2024-05-15 09:00', system: true }
  ];

  var PAGE_SIZE = 8;
  var currentFilter = 'all';
  var currentPage = 1;

  function getFilteredTxs() {
    if (currentFilter === 'all') return allTransactions;
    return allTransactions.filter(function(t) { return t.type === currentFilter; });
  }

  function renderTxList() {
    var filtered = getFilteredTxs();
    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

    var start = (currentPage - 1) * PAGE_SIZE;
    var pageItems = filtered.slice(start, start + PAGE_SIZE);

    var listEl = document.getElementById('tx-list');

    if (pageItems.length === 0) {
      listEl.innerHTML = '<div class="tx-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><p>暂无该类型的交易记录</p></div>';
    } else {
      listEl.innerHTML = pageItems.map(function(tx) {
        var iconSvg = '';
        if (tx.type === 'income') {
          iconSvg = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
        } else {
          iconSvg = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
        }

        var amountClass = tx.type;
        var prefix = tx.type === 'income' ? '+' : (tx.type === 'expense' ? '−' : '');
        var amountDisplay = prefix + ' ' + tx.amount.replace(/[+-]/, '');

        return (
          '<div class="tx-item">' +
            '<div class="tx-icon ' + tx.type + '">' + iconSvg + '</div>' +
            '<div class="tx-body">' +
              '<div class="tx-title">' + tx.title + '</div>' +
              '<div class="tx-order-id">' + tx.id + (tx.orderId !== '—' ? ' · 订单 ' + tx.orderId : '') + '</div>' +
              '<div class="tx-time">' + tx.time + '</div>' +
            '</div>' +
            '<div class="tx-amount-cell">' +
              '<div class="tx-amount ' + amountClass + '">' + amountDisplay + '</div>' +
              '<div class="tx-balance">余额 ⏂' + tx.balance + '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    var pagEl = document.getElementById('tx-pagination');
    if (totalPages <= 1) { pagEl.innerHTML = ''; return; }

    var html = '';
    html += '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage - 1) + ')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>';

    for (var i = 1; i <= totalPages; i++) {
      if (totalPages <= 5 || i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
        html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
      } else if (i === 2 && currentPage > 3) {
        html += '<span class="page-ellipsis">…</span>';
      } else if (i === totalPages - 1 && currentPage < totalPages - 2) {
        html += '<span class="page-ellipsis">…</span>';
      }
    }

    html += '<button ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goPage(' + (currentPage + 1) + ')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
    pagEl.innerHTML = html;
  }

  function goPage(p) { currentPage = p; renderTxList(); }

  /* Filter switching */
  document.querySelectorAll('#tx-filters button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#tx-filters button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      currentPage = 1;
      renderTxList();
    });
  });

  /* Earn coins button */
  document.getElementById('btn-earn').addEventListener('click', function() {
    window.location.href = 'tasks.html';
  });

  /* Help tooltip */
  function showHelp() {
    var tip = document.createElement('div');
    tip.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:400;background:var(--fg);color:#fff;padding:16px 24px;border-radius:var(--radius-lg);font-size:14px;line-height:1.7;max-width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);';
    tip.innerHTML = '<strong>时间币是什么？</strong><br>1 时间币 ≈ 12 分钟服务<br>通过帮助邻居赚取，也可以用来请邻居帮忙。<br>新用户注册即送 5 时间币 🎁';
    document.body.appendChild(tip);
    setTimeout(function() { tip.style.opacity = '0'; tip.style.transition = 'opacity 0.3s'; }, 2500);
    setTimeout(function() { tip.remove(); }, 2800);
  }

  // Initial render
  renderTxList();
</script>
