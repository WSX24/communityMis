<style>
  .results-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-lg);
    border-bottom: 1px solid var(--border-light);
  }
  .results-header .back-btn {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .results-header .back-btn:hover { background: var(--border-light); }
  .results-header h2 {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
  }

  /* Search prompt display */
  .search-prompt-bar {
    margin: var(--space-lg); padding: var(--space-lg);
    background: var(--surface); border: 1.5px solid var(--secondary-light);
    border-radius: var(--radius-lg);
  }
  .search-prompt-bar .prompt-label {
    font-size: 12px; font-weight: 600; color: var(--secondary);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-sm);
    display: flex; align-items: center; gap: 6px;
  }
  .search-prompt-bar .prompt-label svg { width: 16px; height: 16px; }
  .search-prompt-bar .prompt-text {
    font-size: 15px; font-weight: 500; color: var(--fg); margin-bottom: var(--space-md);
  }
  .search-prompt-bar .parsed-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  /* Result count */
  .result-summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--space-lg) var(--space-md);
  }
  .result-summary .count {
    font-size: 14px; color: var(--muted);
  }
  .result-summary .count strong { color: var(--accent); }
  .result-summary .sort-select {
    padding: 6px 12px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-size: 13px;
    color: var(--fg); background: var(--surface);
  }

  /* Task card with match score */
  .task-result-card {
    margin: 0 var(--space-lg) var(--space-md);
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); padding: var(--space-lg);
    transition: box-shadow 0.2s; cursor: pointer;
  }
  .task-result-card:hover { box-shadow: var(--shadow-md); }
  .task-result-card.high-match {
    border-left: 3px solid var(--success);
  }
  .task-result-card.medium-match {
    border-left: 3px solid var(--warning);
  }

  .task-result-card .result-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-sm);
  }
  .task-result-card .match-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600;
  }
  .match-high { background: var(--success-light); color: var(--success); }
  .match-medium { background: var(--warning-light); color: var(--warning); }

  .task-result-card .result-title {
    font-size: 16px; font-weight: 600; margin-bottom: var(--space-sm);
  }
  .task-result-card .result-meta {
    display: flex; flex-wrap: wrap; gap: var(--space-md);
    font-size: 13px; color: var(--muted); margin-bottom: var(--space-sm);
  }
  .task-result-card .result-meta span {
    display: flex; align-items: center; gap: 4px;
  }
  .task-result-card .result-credit {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600;
    background: oklch(94% 0.04 82); color: var(--reward-gold);
  }
  .task-result-card .match-reasons {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: var(--space-sm);
    padding-top: var(--space-md); border-top: 1px solid var(--border-light);
  }
  .task-result-card .match-reason {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 4px 10px; border-radius: var(--radius-full);
    background: var(--secondary-light); color: var(--secondary);
    font-weight: 500;
  }
  .task-result-card .match-reason.match-key {
    background: var(--accent-subtle); color: var(--accent);
  }

  .result-list {
    padding-bottom: calc(var(--bottom-nav-height) + var(--space-2xl));
  }
  @media (min-width: 1024px) {
    .result-list { max-width: 680px; margin: 0 auto; padding-bottom: var(--space-4xl); }
  }

  /* No results */
  .no-results {
    text-align: center; padding: var(--space-4xl) var(--space-xl); color: var(--muted);
  }
  .no-results svg { width: 56px; height: 56px; opacity: 0.25; margin-bottom: var(--space-lg); }
  .no-results p { font-size: 14px; margin-bottom: var(--space-md); line-height: 1.6; }
</style>
