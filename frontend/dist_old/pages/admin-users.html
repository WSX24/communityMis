<style>
  .admin-page {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 100dvh;
  }
  @media (max-width: 860px) {
    .admin-page { grid-template-columns: 1fr; }
    .admin-sidebar { display: none; }
  }

  .admin-sidebar {
    background: var(--fg); color: oklch(92% 0.004 85);
    padding: var(--space-2xl) var(--space-lg); display: flex;
    flex-direction: column; gap: var(--space-3xl);
    position: sticky; top: 0; height: 100dvh;
  }
  .admin-sidebar .sb-brand {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    color: #fff; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: var(--space-sm);
  }
  .admin-sidebar .shield {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 14px;
  }
  .admin-sidebar nav { display: flex; flex-direction: column; gap: 2px; }
  .admin-sidebar nav a {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; color: oklch(72% 0.005 85);
    transition: all 0.15s;
  }
  .admin-sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .admin-sidebar nav a.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 600; }
  .admin-sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
  .admin-sidebar .sb-footer { margin-top: auto; }
  .admin-sidebar .sb-back {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; color: oklch(62% 0.005 85); transition: all 0.15s;
  }
  .admin-sidebar .sb-back:hover { background: rgba(255,255,255,0.06); color: #fff; }

  .admin-main {
    padding: var(--space-3xl); max-width: 1200px;
  }
  @media (max-width: 860px) {
    .admin-main { padding: var(--space-lg); padding-bottom: calc(var(--bottom-nav-height) + var(--space-2xl)); }
  }

  /* Header + search */
  .au-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-2xl); flex-wrap: wrap; gap: var(--space-lg);
  }
  .au-header h2 {
    font-family: var(--font-display); font-size: 26px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .au-search-row {
    display: flex; gap: var(--space-md); flex-wrap: wrap;
    margin-bottom: var(--space-xl); align-items: center;
  }
  .au-search {
    flex: 1; min-width: 200px;
    display: flex; align-items: center; gap: var(--space-sm);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 16px;
    transition: border-color 0.15s;
  }
  .au-search:focus-within { border-color: var(--accent); }
  .au-search input {
    flex: 1; border: none; outline: none; font-size: 14px; background: transparent;
  }
  .au-search svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  .au-filter-group { display: flex; gap: var(--space-sm); flex-wrap: wrap; }

  /* Table */
  .au-table-wrap {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); overflow-x: auto;
    margin-bottom: var(--space-xl);
  }
  .au-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .au-table th {
    text-align: left; padding: 14px var(--space-xl); font-size: 12px;
    font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.04em; border-bottom: 1px solid var(--border-light);
    background: var(--bg); white-space: nowrap;
  }
  .au-table td {
    padding: 14px var(--space-xl); border-bottom: 1px solid var(--border-light);
    vertical-align: middle; white-space: nowrap;
  }
  .au-table tr:last-child td { border-bottom: none; }
  .au-table tr:hover td { background: oklch(97% 0.005 85 / 0.5); }
  .au-table .user-cell {
    display: flex; align-items: center; gap: var(--space-md);
  }
  .au-table .user-avatar {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .au-table .user-name { font-weight: 600; }
  .au-table .user-id { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  /* Credit bar */
  .credit-bar {
    display: flex; align-items: center; gap: var(--space-sm);
  }
  .credit-bar .bar-track {
    width: 60px; height: 6px; border-radius: 3px;
    background: var(--border-light); overflow: hidden;
  }
  .credit-bar .bar-fill { height: 100%; border-radius: 3px; }
  .credit-bar .bar-fill.high { background: var(--success); }
  .credit-bar .bar-fill.mid { background: var(--warning); }
  .credit-bar .bar-fill.low { background: var(--danger); }

  /* Toggle switch */
  .toggle-switch {
    position: relative; width: 44px; height: 24px; cursor: pointer;
  }
  .toggle-switch input { display: none; }
  .toggle-switch .slider {
    position: absolute; inset: 0; border-radius: var(--radius-full);
    background: var(--border); transition: background 0.2s;
  }
  .toggle-switch .slider::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: var(--radius-full);
    background: #fff; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  .toggle-switch input:checked + .slider { background: var(--success); }
  .toggle-switch input:checked + .slider::after { transform: translateX(20px); }

  /* Status pill */
  .status-pill {
    display: inline-flex; padding: 4px 12px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600;
  }
  .status-pill.active { background: var(--success-light); color: var(--success); }
  .status-pill.disabled { background: var(--danger-light); color: var(--danger); }
  .status-pill.restricted { background: var(--warning-light); color: var(--warning); }

  /* Action buttons */
  .action-row { display: flex; gap: var(--space-sm); }
  .action-btn {
    padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--border-light); background: var(--surface); color: var(--muted);
  }
  .action-btn:hover { border-color: var(--accent-light); color: var(--accent); }
  .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

  /* Pagination */
  .au-pagination {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: var(--space-md);
  }
  .au-page-info { font-size: 13px; color: var(--muted); }
  .au-page-btns { display: flex; gap: 4px; }
  .au-page-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; border: 1px solid var(--border-light);
    background: var(--surface); color: var(--fg); transition: all 0.15s; cursor: pointer;
  }
  .au-page-btn:hover { border-color: var(--accent-light); }
  .au-page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .au-page-btn.disabled { opacity: 0.35; pointer-events: none; }
</style>
