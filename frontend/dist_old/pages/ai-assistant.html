<!doctype html>
<html lang="zh-CN" data-auth-state="checking">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 助手 — 邻帮</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/css/tokens.9237d5c336cf.css">
<link rel="stylesheet" href="/css/common.3cf7927f18de.css">
<style>
  /* ===== 基础 ===== */
  *, *::before, *::after { box-sizing: border-box; }

  /* ===== 动画 ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 30%, transparent); }
    50% { box-shadow: 0 0 0 10px color-mix(in oklch, var(--accent) 0%, transparent); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes msgSlideIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes dotPulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes avatarPop {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes bubblePop {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ===== 头部 ===== */
  .ai-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md);
    border-bottom: 1px solid var(--border-light);
    animation: slideInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .ai-header .back-btn {
    width: 40px; height: 40px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    flex-shrink: 0; border: none; background: transparent; color: var(--fg); cursor: pointer;
  }
  .ai-header .back-btn:hover {
    background: color-mix(in oklch, var(--accent) 10%, var(--border-light));
    transform: scale(1.08) translateX(-2px);
    box-shadow: 0 2px 8px color-mix(in oklch, var(--accent) 10%, transparent);
  }
  .ai-header .back-btn:active { transform: scale(0.95); }
  .ai-header .back-btn svg { transition: transform 0.25s ease; }
  .ai-header .back-btn:hover svg { transform: translateX(-2px); }
  .ai-header .ai-brand {
    flex: 1; display: flex; align-items: center; gap: var(--space-sm);
  }
  .ai-header .ai-avatar {
    width: 36px; height: 36px; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--secondary), oklch(62% 0.12 200));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
    box-shadow: 0 2px 8px oklch(52% 0.12 175 / 0.25);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    animation: avatarPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }
  .ai-header .ai-avatar:hover {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 4px 14px oklch(52% 0.12 175 / 0.35);
  }
  .ai-header .ai-title {
    font-family: var(--font-display); font-size: 19px; font-weight: 700;
    letter-spacing: -0.02em; transition: color 0.2s ease;
  }
  .ai-header .ai-subtitle {
    font-size: 11px; color: var(--muted); font-weight: 500;
  }
  .ai-header .header-actions {
    display: flex; gap: var(--space-sm);
  }
  .ai-header .icon-btn-sm {
    width: 40px; height: 40px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; border: none; background: transparent; color: var(--fg); cursor: pointer;
  }
  .ai-header .icon-btn-sm:hover {
    background: color-mix(in oklch, var(--accent) 10%, var(--border-light));
    transform: scale(1.08);
    box-shadow: 0 2px 8px color-mix(in oklch, var(--accent) 10%, transparent);
  }
  .ai-header .icon-btn-sm:active { transform: scale(0.95); }
  .ai-header .icon-btn-sm svg { transition: transform 0.25s ease; }
  .ai-header .icon-btn-sm:hover svg { transform: scale(1.1); }

  /* ===== 场景选择栏 ===== */
  .scene-bar {
    display: flex; gap: 8px; padding: var(--space-md) var(--space-lg);
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
    background: var(--bg); border-bottom: 1px solid var(--border-light);
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
  }
  .scene-bar::-webkit-scrollbar { display: none; }
  .scene-chip {
    padding: 8px 16px; border-radius: var(--radius-full);
    font-size: 13px; font-weight: 500; white-space: nowrap;
    border: 1.5px solid var(--border); color: var(--muted);
    cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); position: relative; overflow: hidden;
  }
  .scene-chip::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, color-mix(in oklch, var(--secondary) 8%, transparent) 0%, transparent 100%);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .scene-chip:hover {
    border-color: var(--secondary-light); color: var(--fg);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px oklch(52% 0.12 175 / 0.1);
  }
  .scene-chip:hover::before { opacity: 1; }
  .scene-chip.active {
    background: var(--secondary); border-color: var(--secondary);
    color: #fff; box-shadow: 0 4px 14px oklch(52% 0.12 175 / 0.25);
  }
  .scene-chip.active::before { display: none; }
  .scene-chip.active:hover {
    background: oklch(48% 0.12 175); border-color: oklch(48% 0.12 175);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px oklch(52% 0.12 175 / 0.3);
  }
  .scene-chip svg { width: 16px; height: 16px; position: relative; z-index: 1; transition: transform 0.25s ease; }
  .scene-chip:hover svg { transform: scale(1.15); }
  .scene-chip span { position: relative; z-index: 1; }

  /* ===== 聊天区域 ===== */
  .ai-chat-area {
    flex: 1; overflow-y: auto; padding: var(--space-lg);
    display: flex; flex-direction: column; gap: var(--space-lg);
    padding-bottom: calc(var(--bottom-nav-height) + var(--space-3xl));
    scroll-behavior: smooth;
    animation: fadeIn 0.5s ease 0.2s both;
  }
  @media (min-width: 1024px) {
    .ai-chat-area {
      max-width: 720px; margin: 0 auto; width: 100%;
      padding-bottom: var(--space-4xl);
    }
  }

  /* ===== 欢迎卡片 ===== */
  .ai-welcome {
    text-align: center; padding: var(--space-2xl) var(--space-xl);
    animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }
  .ai-welcome .welcome-icon {
    width: 72px; height: 72px; border-radius: var(--radius-xl);
    background: linear-gradient(135deg, var(--secondary), oklch(62% 0.12 200));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto var(--space-xl); color: #fff;
    box-shadow: 0 6px 24px oklch(52% 0.12 175 / 0.3);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    animation: float 5s ease-in-out infinite;
  }
  .ai-welcome .welcome-icon:hover {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 10px 32px oklch(52% 0.12 175 / 0.4);
  }
  .ai-welcome .welcome-icon svg { width: 36px; height: 36px; transition: transform 0.3s ease; }
  .ai-welcome .welcome-icon:hover svg { transform: scale(1.15); }
  .ai-welcome h2 {
    font-family: var(--font-display); font-size: 24px; font-weight: 700;
    margin-bottom: var(--space-sm); letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--fg) 0%, color-mix(in oklch, var(--secondary) 60%, var(--fg)) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }
  .ai-welcome p {
    font-size: 14px; color: var(--muted); line-height: 1.7;
    max-width: 380px; margin: 0 auto;
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
  }

  /* ===== 建议问题 ===== */
  .suggested-qs { margin-top: var(--space-xl); animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both; }
  .suggested-qs .sq-label {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: var(--space-md); text-align: left;
  }
  .sq-grid {
    display: grid; gap: 10px;
  }
  .sq-btn {
    width: 100%; text-align: left; padding: 14px 18px;
    border-radius: var(--radius-lg); border: 1.5px solid var(--border-light);
    background: var(--surface); font-size: 14px; line-height: 1.5;
    color: var(--fg); cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: var(--space-sm);
    position: relative; overflow: hidden;
  }
  .sq-btn::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, color-mix(in oklch, var(--secondary) 5%, transparent) 0%, transparent 100%);
    opacity: 0; transition: opacity 0.3s ease;
  }
  .sq-btn:hover {
    border-color: var(--secondary-light);
    box-shadow: 0 6px 20px oklch(52% 0.12 175 / 0.12);
    transform: translateY(-2px);
  }
  .sq-btn:hover::before { opacity: 1; }
  .sq-btn:active { transform: translateY(0) scale(0.99); }
  .sq-btn .sq-icon {
    width: 32px; height: 32px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; z-index: 1;
  }
  .sq-btn:hover .sq-icon { transform: scale(1.1) rotate(-5deg); }
  .sq-btn .sq-text { flex: 1; min-width: 0; position: relative; z-index: 1; transition: color 0.2s ease; }
  .sq-btn:hover .sq-text { color: color-mix(in oklch, var(--fg) 80%, var(--secondary)); }

  /* ===== 聊天消息 ===== */
  .ai-msg {
    display: flex; gap: var(--space-md); max-width: 88%;
    animation: msgSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .ai-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .ai-msg.assistant { align-self: flex-start; }
  .ai-msg .msg-avatar {
    width: 34px; height: 34px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px; font-weight: 700; color: #fff;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 2px 8px color-mix(in oklch, var(--fg) 10%, transparent);
  }
  .ai-msg.user .msg-avatar {
    background: oklch(60% 0.12 28);
  }
  .ai-msg.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--secondary), oklch(62% 0.12 200));
  }
  .ai-msg:hover .msg-avatar { transform: scale(1.08); }
  .ai-msg .msg-bubble {
    padding: 12px 18px; border-radius: var(--radius-lg); font-size: 14px;
    line-height: 1.65; word-break: break-word;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    animation: bubblePop 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .ai-msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--accent) 0%, color-mix(in oklch, var(--accent) 85%, var(--accent-hover)) 100%);
    color: #fff; border-bottom-right-radius: 4px;
    box-shadow: 0 4px 12px color-mix(in oklch, var(--accent) 20%, transparent);
  }
  .ai-msg.user .msg-bubble:hover {
    box-shadow: 0 6px 18px color-mix(in oklch, var(--accent) 30%, transparent);
    transform: translateY(-1px);
  }
  .ai-msg.assistant .msg-bubble {
    background: var(--surface); border: 1px solid var(--border-light);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px color-mix(in oklch, var(--fg) 5%, transparent);
  }
  .ai-msg.assistant .msg-bubble:hover {
    box-shadow: 0 4px 14px color-mix(in oklch, var(--fg) 8%, transparent);
    border-color: color-mix(in oklch, var(--secondary) 30%, var(--border-light));
    transform: translateY(-1px);
  }
  .ai-msg .msg-actions {
    display: flex; gap: var(--space-sm); margin-top: 6px;
    animation: fadeIn 0.3s ease 0.2s both;
  }
  .ai-msg.assistant .msg-actions { justify-content: flex-start; }
  .ai-msg.user .msg-actions { justify-content: flex-end; }
  .ai-msg .msg-btn {
    font-size: 11px; padding: 5px 12px; border-radius: var(--radius-full);
    border: 1px solid var(--border-light); color: var(--muted);
    background: var(--surface); cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; gap: 4px; font-weight: 500;
  }
  .ai-msg .msg-btn:hover {
    border-color: var(--accent-light); color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px color-mix(in oklch, var(--accent) 10%, transparent);
  }
  .ai-msg .msg-btn:active { transform: scale(0.97); }
  .ai-msg .msg-btn.feedback-active {
    background: var(--accent-subtle); border-color: var(--accent); color: var(--accent);
    transform: scale(1.02);
  }
  .ai-msg .msg-btn svg { width: 13px; height: 13px; transition: transform 0.2s ease; }
  .ai-msg .msg-btn:hover svg { transform: scale(1.1); }

  /* ===== 筛选卡片 ===== */
  .apply-filter-card {
    margin-top: var(--space-sm); background: var(--bg);
    border: 1.5px solid var(--secondary-light); border-radius: var(--radius-lg);
    padding: var(--space-lg); transition: all 0.3s ease;
  }
  .apply-filter-card:hover {
    border-color: var(--secondary);
    box-shadow: 0 4px 16px oklch(52% 0.12 175 / 0.1);
  }
  .apply-filter-card .filter-tags {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--space-sm);
  }
  .apply-filter-card .filter-tag {
    font-size: 12px; padding: 5px 12px; border-radius: var(--radius-full);
    background: var(--secondary-light); color: var(--secondary);
    font-weight: 600; transition: all 0.2s ease;
  }
  .apply-filter-card .filter-tag:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 6px oklch(52% 0.12 175 / 0.15);
  }
  .apply-filter-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: var(--radius-md);
    background: var(--secondary); color: #fff; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; overflow: hidden;
  }
  .apply-filter-btn::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transition: left 0.5s ease;
  }
  .apply-filter-btn:hover {
    background: oklch(48% 0.12 175);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px oklch(52% 0.12 175 / 0.3);
  }
  .apply-filter-btn:hover::after { left: 100%; }
  .apply-filter-btn:active { transform: scale(0.97); }

  /* ===== 草稿卡片 ===== */
  .draft-card {
    margin-top: var(--space-sm); background: var(--bg);
    border: 1.5px solid var(--border); border-radius: var(--radius-lg);
    padding: var(--space-lg); transition: all 0.3s ease;
  }
  .draft-card:hover {
    border-color: color-mix(in oklch, var(--accent) 20%, var(--border));
    box-shadow: 0 4px 16px color-mix(in oklch, var(--accent) 6%, transparent);
  }
  .draft-card .draft-title {
    font-size: 15px; font-weight: 700; margin-bottom: var(--space-sm);
    transition: color 0.2s ease;
  }
  .draft-card:hover .draft-title { color: var(--accent); }
  .draft-card .draft-body {
    font-size: 13px; color: var(--muted); line-height: 1.7;
    margin-bottom: var(--space-md);
  }
  .draft-card .draft-tags {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--space-md);
  }
  .draft-card .draft-actions {
    display: flex; gap: var(--space-sm);
  }
  .draft-card .draft-actions .btn {
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .draft-card .draft-actions .btn:hover {
    transform: translateY(-1px);
  }
  .draft-card .draft-actions .btn:active {
    transform: scale(0.97);
  }

  /* ===== 打字指示器 ===== */
  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 20px;
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius-lg); border-bottom-left-radius: 4px;
    align-self: flex-start; max-width: 88%;
    box-shadow: 0 2px 8px color-mix(in oklch, var(--fg) 5%, transparent);
    animation: msgSlideIn 0.3s ease both;
  }
  .typing-indicator .dot {
    width: 7px; height: 7px; border-radius: var(--radius-full);
    background: var(--muted); animation: dotPulse 1.4s ease infinite;
  }
  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  /* ===== 输入栏 ===== */
  .ai-input-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface); border-top: 1px solid var(--border-light);
    padding: var(--space-md) var(--space-lg) calc(var(--space-md) + env(safe-area-inset-bottom, 0));
    display: flex; align-items: flex-end; gap: var(--space-sm);
    box-shadow: 0 -4px 20px color-mix(in oklch, var(--fg) 4%, transparent);
    transition: box-shadow 0.3s ease;
  }
  .ai-input-bar:focus-within {
    box-shadow: 0 -6px 24px color-mix(in oklch, var(--secondary) 10%, transparent);
  }
  @media (min-width: 1024px) {
    .ai-input-bar {
      max-width: 720px; margin: 0 auto; left: 50%; transform: translateX(-50%);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
  }
  .ai-input-bar textarea {
    flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-xl);
    padding: 12px 18px; font-size: 14px; line-height: 1.5; outline: none;
    resize: none; max-height: 120px; background: var(--bg);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: inherit;
  }
  .ai-input-bar textarea::placeholder {
    color: color-mix(in oklch, var(--muted) 60%, transparent);
  }
  .ai-input-bar textarea:hover {
    border-color: color-mix(in oklch, var(--secondary) 35%, var(--border));
  }
  .ai-input-bar textarea:focus {
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--secondary) 12%, transparent);
  }
  .ai-input-bar .send-btn {
    width: 44px; height: 44px; border-radius: var(--radius-full);
    background: linear-gradient(135deg, var(--secondary), oklch(62% 0.12 200));
    color: #fff; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 14px oklch(52% 0.12 175 / 0.25);
    border: none; cursor: pointer;
  }
  .ai-input-bar .send-btn:hover {
    background: var(--secondary);
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 6px 20px oklch(52% 0.12 175 / 0.35);
  }
  .ai-input-bar .send-btn:active { transform: scale(0.95); }
  .ai-input-bar .send-btn:disabled { opacity: 0.4; pointer-events: none; transform: scale(1); }
  .ai-input-bar .send-btn svg { width: 20px; height: 20px; transition: transform 0.2s ease; }
  .ai-input-bar .send-btn:hover svg { transform: scale(1.1) translateX(1px); }

  /* ===== 免责声明 ===== */
  .ai-disclaimer {
    text-align: center; font-size: 11px; color: var(--muted);
    padding: var(--space-md) var(--space-lg) var(--space-4xl);
    line-height: 1.6; font-weight: 500;
    animation: fadeIn 0.5s ease 0.8s both;
  }
