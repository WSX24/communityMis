<style>
  .public-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: oklch(97% 0.005 85 / 0.9);
    border-bottom: 1px solid var(--border-light);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: var(--space-md) var(--space-lg);
  }

  .header-inner {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
  }

  .back-link,
  .header-action {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    min-height: 40px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    transition: color 0.15s, background 0.15s;
  }

  .back-link:hover,
  .header-action:hover {
    color: var(--accent);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .header-action {
    padding: 0 var(--space-md);
    border-radius: var(--radius-full);
    background: var(--surface);
    border: 1px solid var(--border-light);
  }

  .profile-shell {
    width: min(100%, 980px);
    margin: 0 auto;
    padding: var(--space-xl) var(--space-lg) calc(var(--bottom-nav-height) + var(--space-3xl));
    display: grid;
    gap: var(--space-xl);
  }

  .hero-card {
    position: relative;
    overflow: hidden;
    padding: var(--space-2xl);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    background:
      linear-gradient(135deg, var(--accent-subtle), transparent 42%),
      var(--surface);
    box-shadow: var(--shadow-sm);
  }

  .hero-main {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: var(--space-xl);
    align-items: start;
  }

  .public-avatar {
    width: 92px;
    height: 92px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border: 4px solid var(--surface);
    border-radius: var(--radius-full);
    background: var(--accent);
    color: var(--surface);
    box-shadow: var(--shadow-md);
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 800;
  }

  .public-name-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: 6px;
  }

  .public-name {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.08;
    letter-spacing: -0.03em;
  }

  .public-bio {
    max-width: 64ch;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-top: var(--space-lg);
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-full);
    background: color-mix(in oklch, var(--surface) 72%, transparent);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .meta-pill svg {
    width: 15px;
    height: 15px;
  }

  .hero-score {
    min-width: 180px;
    padding: var(--space-lg);
    border: 1px solid color-mix(in oklch, var(--reward-gold) 28%, var(--border));
    border-radius: var(--radius-lg);
    background: var(--surface);
    text-align: center;
  }

  .score-number {
    color: var(--reward-gold);
    font-family: var(--font-display);
    font-size: 40px;
    line-height: 1;
    font-weight: 800;
  }

  .score-label {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
  }

  .score-bars {
    display: grid;
    gap: 7px;
    margin-top: var(--space-md);
  }

  .bar-row {
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: var(--space-sm);
    align-items: center;
    color: var(--muted);
    font-size: 11px;
  }

  .bar-track {
    height: 6px;
    overflow: hidden;
    border-radius: var(--radius-full);
    background: var(--border-light);
  }

  .bar-fill {
    height: 100%;
    border-radius: inherit;
    background: var(--reward-gold);
  }

  .hero-actions {
    display: flex;
    gap: var(--space-sm);
    flex-wrap: wrap;
    margin-top: var(--space-xl);
  }

  .content-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: var(--space-xl);
    align-items: start;
  }

  .stack {
    display: grid;
    gap: var(--space-lg);
  }

  .panel {
    padding: var(--space-xl);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--surface);
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }

  .panel h2 {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .panel-sub {
    color: var(--muted);
    font-size: 13px;
  }

  .service-list {
    display: grid;
    gap: var(--space-md);
  }

  .service-card {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--space-lg);
    align-items: start;
    padding: var(--space-lg);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--bg);
  }

  .service-card h3 {
    margin-bottom: 6px;
    font-size: 16px;
    line-height: 1.3;
  }

  .service-card p {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .reward-chip {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    padding: 7px 12px;
    border-radius: var(--radius-full);
    background: color-mix(in oklch, var(--reward-gold) 18%, transparent);
    color: color-mix(in oklch, var(--reward-gold), var(--fg) 22%);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 900;
  }

  .timeline {
    display: grid;
    gap: var(--space-md);
  }

  .review-item {
    display: grid;
    gap: var(--space-sm);
    padding-bottom: var(--space-md);
    border-bottom: 1px solid var(--border-light);
  }

  .review-item:last-child {
    padding-bottom: 0;
    border-bottom: 0;
  }

  .review-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
  }

  .reviewer {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    min-width: 0;
    font-weight: 800;
    font-size: 14px;
  }

  .review-text {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.65;
  }

  .review-meta {
    color: var(--muted);
    font-size: 12px;
  }

  .rating {
    color: var(--reward-gold);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 900;
  }

  .skill-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-sm);
  }

  .schedule-cell {
    padding: var(--space-md);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    background: var(--bg);
  }

  .schedule-cell strong {
    display: block;
    font-size: 13px;
  }

  .schedule-cell span {
    color: var(--muted);
    font-size: 12px;
  }

  .trust-list {
    display: grid;
    gap: var(--space-md);
  }

  .trust-row {
    display: flex;
    align-items: flex-start;
    gap: var(--space-md);
  }

  .trust-row svg {
    width: 18px;
    height: 18px;
    color: var(--success);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .trust-row strong {
    display: block;
    font-size: 14px;
  }

  .trust-row span {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .contact-sheet {
    position: fixed;
    inset: 0;
    z-index: 400;
    display: none;
    place-items: center;
    padding: var(--space-lg);
    background: rgba(0,0,0,0.32);
  }

  .contact-sheet.open {
    display: grid;
  }

  .contact-card {
    width: min(100%, 430px);
    padding: var(--space-xl);
    border-radius: var(--radius-xl);
    background: var(--surface);
    box-shadow: var(--shadow-lg);
  }

  .contact-card h3 {
    margin-bottom: var(--space-sm);
    font-family: var(--font-display);
    font-size: 22px;
  }

  .contact-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.65;
    margin-bottom: var(--space-lg);
  }

  .contact-actions {
    display: flex;
    gap: var(--space-sm);
    flex-wrap: wrap;
  }

  @media (min-width: 1024px) {
    .bottom-nav {
      display: none;
    }
  }

  @media (max-width: 880px) {
    .hero-main,
    .content-layout {
      grid-template-columns: 1fr;
    }

    .hero-score {
      text-align: left;
    }
  }

  @media (max-width: 560px) {
    .profile-shell {
      padding-inline: var(--space-md);
    }

    .header-action span {
      display: none;
    }

    .hero-card,
    .panel {
      padding: var(--space-lg);
    }

    .public-avatar {
      width: 76px;
      height: 76px;
      font-size: 30px;
    }

    .service-card {
      grid-template-columns: 1fr;
    }

    .schedule-grid {
      grid-template-columns: 1fr;
    }

    .hero-actions .btn {
      flex: 1;
    }
  }
</style>
