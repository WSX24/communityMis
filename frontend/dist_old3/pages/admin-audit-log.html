<style>
  .admin-page { display: grid; grid-template-columns: 220px 1fr; min-height: 100dvh; }
  @media (max-width: 860px) {
    .admin-page { grid-template-columns: 1fr; }
    .admin-sidebar { display: none; }
  }
  .admin-sidebar {
    background: var(--fg); color: oklch(92% 0.004 85);
    padding: var(--space-2xl) var(--space-lg); display: flex;
    flex-direction: column; gap: var(--space-3xl);
    position: sticky; top: 0; height: 100dvh;
  }
  .admin-sidebar .sb-brand {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    color: #fff; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: var(--space-sm);
  }
  .admin-sidebar .shield {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 14px;
  }
  .admin-sidebar nav { display: flex; flex-direction: column; gap: 2px; }
  .admin-sidebar nav a {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; color: oklch(72% 0.005 85);
    transition: all 0.15s;
  }
  .admin-sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .admin-sidebar nav a.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 600; }
  .admin-sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
  .admin-sidebar .sb-footer { margin-top: auto; }
  .admin-sidebar .sb-back {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; color: oklch(62% 0.005 85); transition: all 0.15s;
  }
  .admin-sidebar .sb-back:hover { background: rgba(255,255,255,0.06); color: #fff; }

  .admin-main { padding: var(--space-3xl); max-width: 1200px; }
  @media (max-width: 860px) { .admin-main { padding: var(--space-lg); } }

  .au-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-2xl); flex-wrap: wrap; gap: var(--space-lg);
  }
  .au-header h2 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }

  /* Stats */
  .al-summary {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: var(--space-lg); margin-bottom: var(--space-xl);
  }
  .al-sum-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-lg) var(--space-xl); text-align: center;
  }
  .al-sum-card .al-num { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .al-sum-card .al-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Filter row */
  .au-filter-row {
    display: flex; gap: var(--space-md); margin-bottom: var(--space-xl);
    flex-wrap: wrap; align-items: center;
  }
  .au-search {
    flex: 1; min-width: 180px; display: flex; align-items: center; gap: var(--space-sm);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 16px;
    transition: border-color 0.15s;
  }
  .au-search:focus-within { border-color: var(--accent); }
  .au-search input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; }
  .au-search svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
  .au-filter-row select {
    padding: 9px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--border);
    font-size: 14px; outline: none; background: var(--surface);
  }

  /* Time picker */
  .au-date-input {
    padding: 9px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--border);
    font-size: 14px; outline: none; background: var(--surface); font-family: var(--font-mono);
  }
  .au-date-input:focus { border-color: var(--accent); }

  /* Table */
  .au-table-wrap {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); overflow-x: auto; margin-bottom: var(--space-xl);
  }
  .au-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .au-table th {
    text-align: left; padding: 14px var(--space-xl); font-size: 12px;
    font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.04em; border-bottom: 1px solid var(--border-light);
    background: var(--bg); white-space: nowrap;
  }
  .au-table td { padding: 12px var(--space-xl); border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  .au-table tr:last-child td { border-bottom: none; }
  .au-table tr:hover td { background: oklch(97% 0.005 85 / 0.5); }

  .au-log-id { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
  .au-operator { font-weight: 600; }

  .action-badge {
    display: inline-block; padding: 3px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .action-badge.config { background: var(--secondary-light); color: var(--secondary); }
  .action-badge.user { background: var(--accent-subtle); color: var(--accent); }
  .action-badge.order { background: oklch(93% 0.05 82); color: var(--reward-gold); }
  .action-badge.delete { background: var(--danger-light); color: var(--danger); }
  .action-badge.system { background: var(--border-light); color: var(--muted); }

  .risk-badge {
    display: inline-block; padding: 2px 8px; border-radius: var(--radius-full);
    font-size: 11px; font-weight: 600;
  }
  .risk-badge.high { background: var(--danger-light); color: var(--danger); }
  .risk-badge.medium { background: var(--warning-light); color: var(--warning); }
  .risk-badge.low { background: var(--success-light); color: var(--success); }

  /* Expandable detail */
  .au-expand-btn {
    padding: 4px 12px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border-light); background: var(--surface);
    color: var(--muted); transition: all 0.15s;
  }
  .au-expand-btn:hover { border-color: var(--accent-light); color: var(--accent); }
  .au-detail-row { display: none; }
  .au-detail-row.show { display: table-row; }
  .au-detail-row td { padding: 0; }
  .au-detail-content {
    padding: var(--space-xl); background: var(--bg);
    border-top: 1px solid var(--border-light);
    display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--space-lg); font-size: 13px;
  }
  @media (max-width: 640px) { .au-detail-content { grid-template-columns: 1fr; } }
  .au-detail-content h5 { font-size: 13px; font-weight: 700; margin-bottom: var(--space-sm); }
  .au-detail-content .diff-block {
    background: var(--surface); border-radius: var(--radius-sm); padding: var(--space-md);
    font-family: var(--font-mono); font-size: 11px; line-height: 1.8; white-space: pre-wrap;
    word-break: break-all; max-height: 200px; overflow-y: auto;
  }
  .diff-add { color: var(--success); }
  .diff-remove { color: var(--danger); }
  .diff-key { color: var(--secondary); }

  /* Pagination */
  .au-pagination {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: var(--space-md);
  }
  .au-page-info { font-size: 13px; color: var(--muted); }
  .au-page-btns { display: flex; gap: 4px; }
  .au-page-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; border: 1px solid var(--border-light);
    background: var(--surface); color: var(--fg); transition: all 0.15s; cursor: pointer;
  }
  .au-page-btn:hover { border-color: var(--accent-light); }
  .au-page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .au-page-btn.disabled { opacity: 0.35; pointer-events: none; }
</style>
