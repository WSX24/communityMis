<style>
  .detail-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-lg);
    border-bottom: 1px solid var(--border-light);
  }
  .detail-header .back-btn {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .detail-header .back-btn:hover { background: var(--border-light); }
  .detail-header h2 {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
  }

  .detail-content {
    padding: 0 var(--space-lg) calc(var(--bottom-nav-height) + var(--space-xl));
  }
  @media (min-width: 1024px) {
    .detail-content { max-width: 640px; margin: 0 auto; padding-bottom: var(--space-4xl); }
  }

  /* Post header */
  .post-detail-header {
    padding: var(--space-lg) 0; border-bottom: 1px solid var(--border-light);
  }
  .post-detail-header .author-row {
    display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-md);
  }
  .post-detail-header .author-info { flex: 1; min-width: 0; }
  .post-detail-header .author-name { font-size: 16px; font-weight: 600; }
  .post-detail-header .author-meta { font-size: 13px; color: var(--muted); }
  .post-detail-header .follow-btn {
    padding: 6px 16px; border-radius: var(--radius-full); font-size: 13px;
    font-weight: 600; border: 1.5px solid var(--accent); color: var(--accent);
    transition: all 0.15s;
  }
  .post-detail-header .follow-btn:hover { background: var(--accent-subtle); }

  .post-body-text {
    font-size: 16px; line-height: 1.75; margin-bottom: var(--space-lg);
  }
  .post-images-detail {
    display: grid; gap: 6px; margin-bottom: var(--space-lg);
    border-radius: var(--radius-md); overflow: hidden;
  }
  .post-images-detail.col-1 { grid-template-columns: 1fr; }
  .post-images-detail.col-2 { grid-template-columns: 1fr 1fr; }
  .post-images-detail.col-3 { grid-template-columns: 1fr 1fr 1fr; }
  .post-images-detail img {
    width: 100%; object-fit: cover; background: var(--border-light);
  }
  .post-images-detail.col-1 img { max-height: 420px; object-fit: contain; }
  .post-images-detail.col-2 img, .post-images-detail.col-3 img { aspect-ratio: 1; }

  .post-stats-row {
    display: flex; align-items: center; gap: var(--space-xl);
    padding-bottom: var(--space-lg); border-bottom: 1px solid var(--border-light);
    font-size: 14px; color: var(--muted);
  }
  .post-stats-row span { font-weight: 600; color: var(--fg); }

  .post-actions-row {
    display: flex; align-items: center; gap: 0;
    padding: var(--space-md) 0; border-bottom: 1px solid var(--border-light);
  }
  .post-actions-row .action-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 0; font-size: 14px; color: var(--muted);
    border-radius: var(--radius-sm); transition: all 0.15s;
  }
  .post-actions-row .action-btn:hover { color: var(--accent); background: var(--accent-subtle); }
  .post-actions-row .action-btn.liked { color: var(--accent); font-weight: 600; }
  .post-actions-row .action-btn svg { width: 20px; height: 20px; }

  /* Comment section */
  .comment-section { padding-top: var(--space-lg); }
  .comment-section .section-header { margin-bottom: var(--space-xl); }
  .comment-count { font-size: 13px; color: var(--muted); font-weight: 400; }

  .comment-item {
    display: flex; gap: var(--space-md); margin-bottom: var(--space-xl);
  }
  .comment-item .comment-body { flex: 1; min-width: 0; }
  .comment-item .comment-author {
    font-size: 14px; font-weight: 600; margin-bottom: 2px;
  }
  .comment-item .comment-text {
    font-size: 15px; line-height: 1.6; margin-bottom: 6px;
  }
  .comment-item .comment-footer {
    display: flex; align-items: center; gap: var(--space-lg);
    font-size: 12px; color: var(--muted);
  }
  .comment-item .comment-footer button {
    color: var(--muted); font-size: 12px; transition: color 0.15s;
  }
  .comment-item .comment-footer button:hover { color: var(--accent); }
  .comment-item .reply-badge {
    font-size: 12px; color: var(--accent); font-weight: 500;
    margin-right: 2px;
  }

  /* Reply to (nested) */
  .reply-item {
    background: var(--bg); border-radius: var(--radius-md);
    padding: var(--space-md); margin-top: var(--space-md);
    margin-left: 0;
  }

  /* Comment input */
  .comment-input-bar {
    position: sticky; bottom: 0; z-index: 50;
    background: var(--surface); border-top: 1px solid var(--border-light);
    padding: var(--space-md) var(--space-lg) calc(var(--space-md) + env(safe-area-inset-bottom, 0));
    display: flex; align-items: center; gap: var(--space-sm);
    margin: 0 calc(-1 * var(--space-lg));
    width: calc(100% + var(--space-lg) * 2);
  }
  @media (min-width: 1024px) {
    .comment-input-bar { border-radius: var(--radius-xl) var(--radius-xl) 0 0; margin: 0; width: 100%; }
  }
  .comment-input-bar input {
    flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-xl);
    padding: 10px 16px; font-size: 14px; outline: none; background: var(--bg);
    transition: border-color 0.15s;
  }
  .comment-input-bar input:focus { border-color: var(--accent); }
  .comment-input-bar .send-icon {
    width: 40px; height: 40px; border-radius: var(--radius-full);
    background: var(--accent); color: #fff; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s;
  }
  .comment-input-bar .send-icon:hover { background: var(--accent-hover); }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 200;
    background: var(--fg); color: #fff; padding: 10px 24px;
    border-radius: var(--radius-full); font-size: 14px; font-weight: 600;
    box-shadow: var(--shadow-lg); opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
