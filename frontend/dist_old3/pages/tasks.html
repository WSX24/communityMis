<style>
  /* ===== 顶部导航 ===== */
  .tasks-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: var(--space-lg) var(--space-lg) var(--space-md);
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .tasks-header.scrolled {
    border-bottom-color: var(--border-light);
    box-shadow: var(--shadow-sm);
  }
  .tasks-header h2 {
    font-family: var(--font-display); font-size: 26px; font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: var(--space-md);
  }
  .tasks-header h2 span { color: var(--accent); }

  .search-row {
    display: flex; gap: var(--space-sm);
  }
  .search-row .search-box {
    flex: 1; display: flex; align-items: center; gap: var(--space-sm);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-xl); padding: 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-row .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }
  .search-row .search-box input {
    flex: 1; border: none; outline: none; background: none; font-size: 14px;
    color: var(--fg);
  }
  .search-row .search-box input::placeholder { color: var(--muted); }

  .filter-btn {
    width: 44px; height: 44px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; cursor: pointer;
    color: var(--muted);
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(1.05);
  }
  .filter-btn svg { width: 20px; height: 20px; }

  .ai-filter-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: 14px; font-weight: 600; color: var(--muted);
    transition: all 0.2s; flex-shrink: 0; cursor: pointer;
    text-decoration: none;
  }
  .ai-filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-subtle);
    transform: scale(1.02);
  }
  .ai-filter-btn svg { width: 18px; height: 18px; }

  /* Scrollable filter bar */
  .filter-bar {
    display: flex; gap: 8px; margin-top: var(--space-md);
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
    padding-bottom: 4px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  /* Sort row */
  .sort-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-md) var(--space-lg);
    max-width: 800px; margin: 0 auto;
  }
  .sort-row .result-count { font-size: 13px; color: var(--muted); font-weight: 500; }
  .sort-row .sort-options { display: flex; gap: 4px; }

  /* ===== 任务网格 ===== */
  .task-grid {
    display: grid; gap: var(--space-md);
    padding: 0 var(--space-lg) calc(var(--bottom-nav-height) + var(--space-2xl));
    max-width: 800px; margin: 0 auto;
  }
  @media (min-width: 768px) {
    .task-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ===== 任务卡片 ===== */
  .task-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1.5px solid var(--border-light); padding: var(--space-lg);
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .task-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .task-card.urgent {
    border-color: oklch(94% 0.06 75);
  }
  .task-card.urgent::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--warning), var(--reward-gold));
  }
  .task-card .card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: var(--space-sm);
    gap: var(--space-sm);
  }
  .task-card .task-title {
    font-size: 16px; font-weight: 700; line-height: 1.4;
    flex: 1; color: var(--fg);
  }
  .task-card .task-desc {
    font-size: 13px; color: var(--muted); line-height: 1.6;
    margin-bottom: var(--space-md);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .task-card .meta-row {
    display: flex; flex-wrap: wrap; gap: var(--space-md);
    font-size: 12px; color: var(--muted); margin-bottom: var(--space-md);
  }
  .task-card .meta-row span {
    display: flex; align-items: center; gap: 4px;
  }
  .task-card .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: var(--space-md); border-top: 1px solid var(--border-light);
  }
  .task-card .publisher-info {
    display: flex; align-items: center; gap: var(--space-sm); font-size: 13px;
    text-decoration: none; color: inherit;
    transition: color 0.2s;
  }
  .task-card .publisher-info:hover { color: var(--accent); }
  .task-card .publisher-info .rating {
    font-size: 11px; color: var(--reward-gold); font-weight: 600;
  }

  .reward-badge {
    display: inline-flex; align-items: center; gap: 3px;
    background: linear-gradient(135deg, oklch(65% 0.18 82), oklch(56% 0.17 70));
    color: #fff; padding: 5px 14px; border-radius: var(--radius-full);
    font-size: 15px; font-weight: 700; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(217, 119, 87, 0.3);
    flex-shrink: 0;
  }
  .reward-badge.sm { font-size: 13px; padding: 3px 10px; }

  /* ===== 详情弹窗 ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: var(--surface);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    width: 100%; max-width: 520px; max-height: 85dvh; overflow-y: auto;
    padding: var(--space-2xl);
    transform: translateY(40px);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  @media (min-width: 768px) {
    .modal-overlay { align-items: center; padding: 40px; }
    .modal-sheet {
      border-radius: var(--radius-xl);
      max-height: 80vh;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
  }
  .modal-sheet .modal-handle {
    width: 40px; height: 4px; border-radius: var(--radius-full);
    background: var(--border); margin: 0 auto var(--space-xl);
  }
  .modal-sheet .modal-title {
    font-size: 22px; font-weight: 700; margin-bottom: var(--space-md);
    color: var(--fg);
  }
  .modal-sheet .modal-reward {
    display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-xl);
  }
  .modal-sheet .modal-desc {
    font-size: 15px; line-height: 1.7; color: var(--muted); margin-bottom: var(--space-xl);
  }
  .modal-sheet .modal-meta {
    display: flex; flex-wrap: wrap; gap: var(--space-lg);
    padding: var(--space-lg); background: var(--bg); border-radius: var(--radius-md);
    margin-bottom: var(--space-xl); font-size: 14px;
  }
  .modal-sheet .modal-meta dt { font-size: 12px; color: var(--muted); font-weight: 500; }
  .modal-sheet .modal-meta dd { font-weight: 700; margin-top: 4px; color: var(--fg); }
  .modal-sheet .modal-actions {
    display: flex; gap: var(--space-md);
  }

  /* ===== 桌面侧边栏 ===== */
  @media (min-width: 1024px) {
    .tasks-layout {
      display: flex; gap: var(--space-2xl);
      max-width: 1100px; margin: 0 auto; padding: 0 var(--space-xl);
    }
    .tasks-sidebar {
      width: 200px; flex-shrink: 0; padding-top: var(--space-xl);
    }
    .tasks-sidebar h4 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      color: var(--muted); margin-bottom: var(--space-md); letter-spacing: 0.08em;
    }
    .tasks-sidebar .side-filters {
      display: flex; flex-direction: column; gap: 4px;
    }
    .tasks-sidebar .side-filter {
      padding: 8px 12px; border-radius: var(--radius-sm); font-size: 14px;
      color: var(--muted); transition: all 0.2s; cursor: pointer;
      font-weight: 500;
    }
    .tasks-sidebar .side-filter:hover {
      background: var(--border-light);
      color: var(--fg);
      transform: translateX(2px);
    }
    .tasks-sidebar .side-filter.active {
      background: var(--accent-subtle);
      color: var(--accent);
      font-weight: 700;
    }
    .tasks-main { flex: 1; min-width: 0; }
    .sort-row { padding: var(--space-md) 0; }
    .task-grid { padding: 0 0 calc(var(--bottom-nav-height) + var(--space-2xl)); }
  }

  /* ===== AI FAB ===== */
  .ai-fab {
    position: fixed; right: 20px; bottom: calc(80px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    z-index: 90; transition: transform 0.3s, box-shadow 0.3s;
  }
  .ai-fab:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45);
  }
  .ai-fab svg { width: 24px; height: 24px; }
  .fab-pulse {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    animation: fabPulse 2s ease-out infinite;
  }
  @keyframes fabPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ===== 底部导航 ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: oklch(98% 0.005 85 / 0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border-light);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottom-nav a {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    transition: color 0.2s; padding: 4px 12px; text-decoration: none;
  }
  .bottom-nav a svg { width: 22px; height: 22px; transition: transform 0.2s; }
  .bottom-nav a:hover { color: var(--accent); }
  .bottom-nav a:hover svg { transform: translateY(-2px); }
  .bottom-nav a.active { color: var(--accent); }
  .bottom-nav a.active svg { transform: translateY(-2px); }

  .publish-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff !important;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    margin-top: -24px; transition: transform 0.2s, box-shadow 0.2s;
  }
  .publish-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
  }
  .publish-btn svg { width: 24px; height: 24px; }

  /* ===== 通用微件 ===== */
  .chip {
    flex-shrink: 0; padding: 7px 16px; border-radius: var(--radius-full);
    font-size: 13px; font-weight: 600; color: var(--muted);
    background: var(--surface); border: 1.5px solid var(--border);
    transition: all 0.2s ease; cursor: pointer; user-select: none;
  }
  .chip:hover { border-color: var(--accent-light); color: var(--accent); }
  .chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
  }

  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600;
  }
  .badge--warning { background: oklch(95% 0.05 85); color: oklch(55% 0.12 70); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: var(--space-sm); border-radius: var(--radius-full);
    font-weight: 700; border: none; cursor: pointer;
    transition: all 0.2s;
  }
  .btn--sm { padding: 8px 18px; font-size: 14px; }
  .btn--primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
  }
  .btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
  }
  .btn--secondary {
    background: var(--border-light);
    color: var(--muted);
  }
  .btn--outline {
    padding: 10px 20px;
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
  }
  .btn--outline:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn--full { flex: 1; padding: 12px 20px; font-size: 15px; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 700;
  }
  .avatar.sm {
    width: 28px; height: 28px; font-size: 12px;
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .tasks-header { padding: var(--space-md) var(--space-md) var(--space-sm); }
    .task-grid { padding: 0 var(--space-md) calc(var(--bottom-nav-height) + var(--space-2xl)); }
    .sort-row { padding: var(--space-sm) var(--space-md); }
  }
</style>

<!-- 顶部 Header -->

  <div class="search-row">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

<!-- 桌面布局 -->

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modal">

    <div class="modal-reward"><span class="reward-badge" id="modal-reward"></span></div>
    <p class="modal-desc" id="modal-desc"></p>
    <dl class="modal-meta">
      <div><dt>执行地点</dt><dd id="modal-location"></dd></div>
      <div><dt>截止时间</dt><dd id="modal-deadline"></dd></div>
      <div><dt>发布者</dt><dd id="modal-publisher"></dd></div>
    </dl>
    <div class="modal-actions">
      <button class="btn btn--outline btn--full">私信询问</button>
      <button class="btn btn--primary btn--full">立即接单</button>
    </div>
  </div>
</div>
