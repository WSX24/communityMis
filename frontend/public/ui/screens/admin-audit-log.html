  { id:'AUDIT', time:'2026-06-02 09:00:00', operator:'system', role:'系统', action:'system', actionLabel:'登录告警', target:'管理员 管理员甲', summary:'异地登录告警 — IP: 203.0.113.42', detail:'事件: 异地登录\n账号: 管理员甲 (超级管理员)\nIP: 203.0.113.42 (海外)\n常用IP: 192.168.1.100\n处理: 已要求二次验证', risk:'high' },
];

function actionBadge(a) {
  const map = { config:'config', user:'user', order:'order', delete:'delete', system:'system' };
  return `<span class="action-badge ${map[a]||'system'}">${logs.find(l=>l.action===a)?.actionLabel || a}</span>`;
}

function riskBadge(r) {
  return `<span class="risk-badge ${r}">${r==='high'?'高风险':r==='medium'?'中风险':'低风险'}</span>`;
}

function renderTable(data) {
  document.getElementById('logTable').innerHTML = data.map((l,i) => `
    <tr>
      <td><span class="au-log-id">#${l.id}</span></td>
      <td style="font-family:var(--font-mono);font-size:12px;white-space:nowrap">${l.time}</td>
      <td><span class="au-operator">${l.operator}</span> <span style="font-size:11px;color:var(--muted)">${l.role}</span></td>
      <td>${actionBadge(l.action)}</td>
      <td style="font-size:13px">${l.target}</td>
      <td style="font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.summary}">${l.summary}</td>
      <td>${riskBadge(l.risk)}</td>
      <td><button class="au-expand-btn" onclick="toggleDetail(${i})">查看详情</button></td>
    </tr>
    <tr class="au-detail-row" id="detail-${i}">
      <td colspan="8">
        <div class="au-detail-content">
          <div>
            <h5>📋 操作详情</h5>
            <div style="font-size:12px;line-height:1.8;color:var(--muted)">
              <div><strong>日志ID：</strong>${l.id}</div>
              <div><strong>操作时间：</strong>${l.time}</div>
              <div><strong>操作人：</strong>${l.operator} (${l.role})</div>
              <div><strong>操作类型：</strong>${l.actionLabel}</div>
              <div><strong>操作对象：</strong>${l.target}</div>
              <div><strong>风险等级：</strong>${riskBadge(l.risk)}</div>
              <div style="margin-top:8px"><strong>IP 地址：</strong>${l.operator==='system'?'—':'192.168.1.' + (100 + i)}</div>
              <div><strong>User-Agent：</strong>${l.operator==='system'?'—':'Mozilla/5.0 … Chrome/125.0 …'}</div>
            </div>
          </div>
          <div>
            <h5>📝 变更记录</h5>
            <div class="diff-block">${formatDiff(l.detail)}</div>
          </div>
        </div>
      </td>
    </tr>
  `).join('');
}

function formatDiff(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('before:')) return `<span class="diff-remove">${escapeHtml(line)}</span>`;
    if (line.startsWith('after:')) return `<span class="diff-add">${escapeHtml(line)}</span>`;
    if (line.includes(':')) {
      const [key, ...rest] = line.split(':');
      return `<span class="diff-key">${escapeHtml(key)}:</span>${escapeHtml(rest.join(':'))}`;
    }
    return escapeHtml(line);
  }).join('\n');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDetail(i) {
  document.getElementById('detail-' + i).classList.toggle('show');
}

function filterLogs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const action = document.getElementById('actionFilter').value;
  const risk = document.getElementById('riskFilter').value;
  const filtered = logs.filter(l =>
    (!search || l.operator.includes(search) || l.target.includes(search) || l.summary.includes(search)) &&
    (!action || l.action === action) &&
    (!risk || l.risk === risk)
  );
  renderTable(filtered);
  document.getElementById('pageInfo').textContent = `筛选结果: ${filtered.length} 条`;
}

function exportCSV() {
  const header = '日志ID,操作时间,操作人,角色,操作类型,操作对象,变动摘要,风险等级\n';
  const rows = logs.map(l => `${l.id},${l.time},${l.operator},${l.role},${l.actionLabel},${l.target},${l.summary},${l.risk}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'audit-log-export.csv'; a.click();
  URL.revokeObjectURL(url);
}

renderTable(logs);
</script>
