<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>陪审大厅</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/css/tokens.css">
<style>
body{min-height:100dvh;padding:0;margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg)}
.w{max-width:680px;margin:0 auto;padding:20px 16px 100px}
h2{font-size:22px;margin:0 0 4px}
.d{color:var(--muted);font-size:14px;margin:0 0 24px}
.l{display:grid;gap:12px}
.c{display:block;padding:16px;border:1px solid var(--border-light);border-radius:10px;background:var(--surface);text-decoration:none;color:var(--fg)}
.c:hover{border-color:var(--accent-light)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ci{font-weight:700;font-size:15px;color:var(--accent)}
.ct{font-size:12px;padding:2px 8px;border-radius:10px;background:#f3f4f6;color:var(--muted)}
.cb{font-size:14px;color:var(--fg-secondary);margin-bottom:10px;line-height:1.5}
.cf{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.ca{color:var(--accent);font-weight:600}
.s{text-align:center;padding:40px;color:var(--muted)}
.se{color:var(--danger)}
.s a,.s button{margin-top:12px;padding:8px 16px;border-radius:6px;background:var(--accent);color:#fff;border:0;text-decoration:none;font-size:14px;cursor:pointer;display:inline-block}
.bn{position:fixed;bottom:0;left:0;right:0;background:oklch(98% 0.005 85/.92);backdrop-filter:blur(12px);border-top:1px solid var(--border-light);display:flex;justify-content:space-around;align-items:center;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.bn a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;padding:4px 12px}
.bn a.ac{color:var(--accent)}
</style>
</head>
<body>
<div class="w"><h2>陪审大厅</h2><p class="d">等待陪审团投票的纠纷，请公正判断</p><div class="l" id="L"><div class="s">正在加载...</div></div></div>
<nav class="bn"><a href="/feed">首页</a><a href="/tasks">任务</a><a href="/post">发布</a><a href="/messages">消息</a><a href="/profile">我的</a><a href="/jury" class="ac">陪审</a></nav>
<script>
(function(){
var L=document.getElementById("L");
var M={quality_issue:"质量问题",communication:"沟通纠纷",not_completed:"未完成"};
function load(){
var u=window.__API_BASE_URL__||"";
if(!u){fetch("/config.json").then(function(r){return r.json()}).then(function(c){window.__API_BASE_URL__=c.apiBaseUrl;load()}).catch(function(){setTimeout(load,1000)});return}
fetch(u+"/api/jury/disputes",{credentials:"include",headers:{Accept:"application/json"}})
.then(function(r){
if(r.status===401){L.innerHTML="<div class="s se"><strong>请先登录</strong><p>只有陪审员才能访问</p><a href="/login?redirect=/jury">去登录</a></div>";return}
if(r.status===403){L.innerHTML="<div class="s se"><strong>无权限</strong><p>您还不是陪审员</p><a href="/feed">返回首页</a></div>";return}
if(!r.ok)throw new Error("HTTP "+r.status);return r.json()
})
.then(function(d){
if(!d||!d.disputes||!d.disputes.length){L.innerHTML="<div class="s"><strong>暂无待投票纠纷</strong><p>当前没有需要陪审团投票的纠纷</p><a href="/feed">返回首页</a></div>";return}
L.innerHTML=d.disputes.map(function(x){return "<a href="/jury/voting?disputeId="+x.disputeId+"" class="c"><div class="ch"><span class="ci">#"+x.disputeId+"</span><span class="ct">"+(M[x.type]||"其他")+"</span></div><div class="cb">"+(x.reason||"").substring(0,120)+"</div><div class="cf"><span>订单 #"+x.orderId+"</span><span class="ca">参与投票</span></div></a>"}).join("")
})
.catch(function(e){L.innerHTML="<div class="s se"><strong>加载失败</strong><p>"+e.message+"</p><button onclick="location.reload()">重试</button></div>"})
}
load()
})();
</script>
</body>
</html>
