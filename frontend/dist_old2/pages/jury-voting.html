<style>
  .jury-page { max-width: 860px; margin: 0 auto; padding: var(--space-3xl) var(--space-lg); }
  @media (max-width: 640px) { .jury-page { padding: var(--space-lg); } }

  .jury-back {
    display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--muted);
    margin-bottom: var(--space-2xl); transition: color 0.15s;
  }
  .jury-back:hover { color: var(--fg); }

  .jury-header {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-2xl);
    margin-bottom: var(--space-xl);
  }
  .jury-badge-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-lg); flex-wrap: wrap; }
  .jury-badge-row .jtag {
    font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: var(--radius-full);
  }
  .jtag.dispute { background: var(--danger-light); color: var(--danger); }
  .jtag.order { background: var(--border-light); color: var(--muted); }
  .jtag.urgent { background: var(--warning-light); color: var(--warning); }

  .jury-header h1 {
    font-family: var(--font-display); font-size: 22px; font-weight: 700;
    letter-spacing: -0.01em; margin-bottom: var(--space-sm); line-height: 1.3;
  }
  .jury-header .jh-meta { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .jury-header .jh-meta strong { color: var(--fg); }

  /* Evidence panels */
  .evidence-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: var(--space-lg); margin-bottom: var(--space-xl);
  }
  @media (max-width: 640px) { .evidence-grid { grid-template-columns: 1fr; } }
  .evidence-panel {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-xl);
  }
  .evidence-panel .ep-role {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: var(--space-md); color: var(--muted);
    display: flex; align-items: center; gap: var(--space-sm);
  }
  .evidence-panel .ep-role .dot {
    width: 10px; height: 10px; border-radius: var(--radius-full);
  }
  .evidence-panel .ep-role .dot.demand { background: var(--secondary); }
  .evidence-panel .ep-role .dot.service { background: var(--accent); }
  .evidence-panel .ep-user { font-size: 16px; font-weight: 700; margin-bottom: var(--space-sm); }
  .evidence-panel .ep-credit { font-size: 12px; color: var(--muted); margin-bottom: var(--space-lg); }
  .evidence-panel .ep-claim {
    font-size: 14px; line-height: 1.7; color: var(--fg); margin-bottom: var(--space-lg);
    padding: var(--space-md); background: var(--bg); border-radius: var(--radius-sm);
  }
  .evidence-panel .ep-files { display: flex; flex-direction: column; gap: var(--space-sm); }
  .evidence-panel .ep-file {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--bg); font-size: 12px; color: var(--muted);
    font-family: var(--font-mono);
  }

  /* AI summary box */
  .ai-box {
    background: oklch(96% 0.02 200); border: 1px solid var(--secondary-light);
    border-radius: var(--radius-lg); padding: var(--space-xl); margin-bottom: var(--space-xl);
  }
  .ai-box h3 {
    font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: var(--space-sm);
    color: var(--secondary); margin-bottom: var(--space-lg);
  }
  .ai-box .ai-items { display: grid; gap: var(--space-md); }
  .ai-box .ai-item { display: flex; gap: var(--space-md); font-size: 13px; line-height: 1.6; }
  .ai-box .ai-label { font-weight: 600; white-space: nowrap; color: var(--fg); min-width: 64px; }
  .ai-box .ai-note {
    margin-top: var(--space-md); font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }

  /* Current tally */
  .tally-section { margin-bottom: var(--space-xl); }
  .tally-section h3 {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    margin-bottom: var(--space-lg); display: flex; align-items: center; gap: var(--space-sm);
  }
  .tally-bars { display: flex; gap: var(--space-md); flex-wrap: wrap; }
  .tally-bar-card {
    flex: 1; min-width: 120px; background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-lg); text-align: center;
  }
  .tally-bar-card .tb-label { font-size: 13px; color: var(--muted); margin-bottom: var(--space-sm); }
  .tally-bar-card .tb-count {
    font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
    margin-bottom: var(--space-sm);
  }
  .tally-bar-card .tb-bar {
    height: 6px; border-radius: 3px; background: var(--border-light); overflow: hidden;
  }
  .tally-bar-card .tb-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .tb-fill.demand { background: var(--secondary); }
  .tb-fill.service { background: var(--accent); }
  .tb-fill.mediate { background: var(--warning); }

  .tally-table {
    width: 100%; background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); overflow: hidden;
    margin-top: var(--space-lg);
  }
  .tally-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tally-table th {
    text-align: left; padding: 12px var(--space-lg); font-size: 11px;
    font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.04em; border-bottom: 1px solid var(--border-light);
    background: var(--bg);
  }
  .tally-table td { padding: 12px var(--space-lg); border-bottom: 1px solid var(--border-light); }
  .tally-table tr:last-child td { border-bottom: none; }
  .tally-table .vote-badge {
    display: inline-block; padding: 3px 10px; border-radius: var(--radius-full);
    font-size: 12px; font-weight: 600;
  }
  .vote-badge.demand { background: var(--secondary-light); color: var(--secondary); }
  .vote-badge.service { background: var(--accent-subtle); color: var(--accent); }
  .vote-badge.mediate { background: var(--warning-light); color: var(--warning); }

  /* Vote form */
  .vote-form {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 2px solid var(--accent); padding: var(--space-2xl);
  }
  .vote-form h3 {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    margin-bottom: var(--space-sm);
  }
  .vote-form .vf-subtitle {
    font-size: 13px; color: var(--muted); margin-bottom: var(--space-xl);
  }
  .vote-options { display: flex; gap: var(--space-md); margin-bottom: var(--space-xl); flex-wrap: wrap; }
  .vote-opt {
    flex: 1; min-width: 130px; padding: var(--space-xl); border-radius: var(--radius-md);
    border: 2px solid var(--border-light); text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .vote-opt:hover { border-color: var(--accent-light); }
  .vote-opt.selected { border-color: var(--accent); background: var(--accent-subtle); }
  .vote-opt .vo-icon { font-size: 28px; margin-bottom: var(--space-sm); }
  .vote-opt .vo-label { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .vote-opt .vo-desc { font-size: 12px; color: var(--muted); }
  .vote-textarea {
    width: 100%; min-height: 80px; padding: 12px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); font-size: 14px; outline: none;
    margin-bottom: var(--space-xl); resize: vertical; font-family: var(--font-body);
  }
  .vote-textarea:focus { border-color: var(--accent); }
  .vote-char-count { font-size: 12px; color: var(--muted); text-align: right; margin-top: -16px; margin-bottom: var(--space-lg); }
  .vote-actions { display: flex; gap: var(--space-md); flex-wrap: wrap; }
  .vote-submitted {
    text-align: center; padding: var(--space-3xl);
  }
  .vote-submitted .vs-icon { font-size: 48px; margin-bottom: var(--space-lg); }
  .vote-submitted .vs-title { font-size: 18px; font-weight: 700; margin-bottom: var(--space-sm); }
  .vote-submitted .vs-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: var(--space-xl); }

  /* Confirm dialog overlay */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .confirm-overlay.open { opacity: 1; pointer-events: auto; }
  .confirm-dialog {
    background: var(--surface); border-radius: var(--radius-xl); padding: var(--space-3xl);
    max-width: 420px; width: 90%; text-align: center; box-shadow: var(--shadow-lg);
  }
  .confirm-dialog .cd-icon { font-size: 40px; margin-bottom: var(--space-lg); }
  .confirm-dialog .cd-title { font-size: 17px; font-weight: 700; margin-bottom: var(--space-sm); }
  .confirm-dialog .cd-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: var(--space-xl); }
  .confirm-dialog .cd-actions { display: flex; gap: var(--space-md); justify-content: center; }

  .toast {
    position: fixed; bottom: var(--space-3xl); left: 50%; transform: translateX(-50%);
    background: var(--fg); color: #fff; padding: 12px 24px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500; z-index: 500; box-shadow: var(--shadow-lg);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
