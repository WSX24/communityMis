<style>
  .detail-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 1px solid var(--border-light);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md);
  }
  .detail-back {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    background: var(--border-light); display: flex; align-items: center;
    justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .detail-back:hover { background: var(--border); }
  .detail-title { flex: 1; font-family: var(--font-display); font-size: 18px; font-weight: 700; }

  .detail-body {
    padding: var(--space-lg); padding-bottom: calc(var(--bottom-nav-height) + var(--space-2xl));
    max-width: 680px; margin: 0 auto;
  }
  @media (min-width: 1024px) { .detail-body { padding-bottom: var(--space-4xl); } }

  /* Info card */
  .info-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-xl);
    margin-bottom: var(--space-lg);
  }
  .info-card .order-no {
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
    margin-bottom: var(--space-sm);
  }
  .info-card .order-title {
    font-family: var(--font-display); font-size: 22px; font-weight: 700;
    line-height: 1.3; margin-bottom: var(--space-md);
  }
  .info-card .info-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg);
    margin-top: var(--space-lg); padding-top: var(--space-lg);
    border-top: 1px solid var(--border-light);
  }
  .info-cell dt { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .info-cell dd { font-size: 15px; font-weight: 600; }
  .info-cell dd.amount { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* Timeline */
  .timeline { margin: var(--space-xl) 0; }
  .timeline h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--space-lg); }
  .tl-step {
    display: flex; gap: var(--space-lg); padding-bottom: var(--space-xl);
    position: relative;
  }
  .tl-step:last-child { padding-bottom: 0; }
  .tl-step .tl-node-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
  .tl-step .tl-node {
    width: 32px; height: 32px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; z-index: 1;
  }
  .tl-step .tl-line {
    flex: 1; width: 2px; min-height: 20px; margin-top: 4px;
  }
  .tl-step.done .tl-node { background: var(--success); color: #fff; }
  .tl-step.done .tl-line { background: var(--success); }
  .tl-step.active .tl-node {
    background: var(--accent-subtle); color: var(--accent);
    border: 2px solid var(--accent);
  }
  .tl-step.active .tl-line { background: var(--border-light); }
  .tl-step.pending .tl-node {
    background: var(--border-light); color: var(--muted);
  }
  .tl-step.pending .tl-line { background: var(--border-light); }

  .tl-step .tl-content { flex: 1; min-width: 0; padding-top: 4px; }
  .tl-step .tl-step-title { font-size: 15px; font-weight: 600; }
  .tl-step .tl-step-desc { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
  .tl-step .tl-step-time { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }

  /* Party cards */
  .party-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);
    margin: var(--space-lg) 0;
  }
  .party-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-lg); text-align: center;
  }
  .party-card .party-role {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); margin-bottom: var(--space-md);
  }
  .party-card .party-confirm {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--radius-full);
    font-size: 13px; font-weight: 600; margin-top: var(--space-sm);
  }
  .party-card .confirmed { background: var(--success-light); color: var(--success); }
  .party-card .unconfirmed { background: var(--warning-light); color: var(--warning); }

  /* Action bar */
  .action-bar {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); padding: var(--space-lg);
    margin: var(--space-lg) 0;
  }
  .action-bar h3 { font-size: 15px; font-weight: 700; margin-bottom: var(--space-md); }
  .action-bar .btn-row { display: flex; gap: var(--space-md); flex-wrap: wrap; }

  /* AI Summary card */
  .ai-summary-card {
    background: linear-gradient(135deg, oklch(96% 0.02 200), var(--surface));
    border: 1.5px solid var(--secondary-light); border-radius: var(--radius-lg);
    padding: var(--space-lg); margin: var(--space-lg) 0;
  }
  .ai-summary-card .ai-header {
    display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md);
  }
  .ai-summary-card .ai-badge {
    font-size: 11px; padding: 3px 10px; border-radius: var(--radius-full);
    background: var(--secondary); color: #fff; font-weight: 600;
  }
  .ai-summary-card .ai-content {
    font-size: 14px; line-height: 1.7; color: var(--muted);
  }
  .ai-summary-card .ai-disclaimer {
    font-size: 11px; color: var(--muted); margin-top: var(--space-md);
    padding-top: var(--space-md); border-top: 1px dashed var(--border);
  }

  .summary-loading {
    display: flex; align-items: center; gap: var(--space-sm);
    color: var(--secondary); font-size: 14px; padding: var(--space-md) 0;
  }

  /* Chat messages area */
  .chat-area { margin: var(--space-lg) 0; }
  .chat-area h3 { font-size: 16px; font-weight: 700; margin-bottom: var(--space-lg); }
  .chat-msg {
    display: flex; gap: var(--space-md); margin-bottom: var(--space-lg);
  }
  .chat-msg.me { flex-direction: row-reverse; }
  .chat-msg .cm-bubble {
    max-width: 75%; padding: 10px 16px; border-radius: var(--radius-lg);
    font-size: 14px; line-height: 1.55;
  }
  .chat-msg.other .cm-bubble {
    background: var(--bg); border: 1px solid var(--border-light);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.me .cm-bubble {
    background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg .cm-time {
    font-size: 11px; color: var(--muted); margin-top: 4px;
  }

  @media (max-width: 480px) {
    .info-card .info-row { grid-template-columns: 1fr; gap: var(--space-md); }
    .party-row { grid-template-columns: 1fr; }
    .action-bar .btn-row { flex-direction: column; }
    .action-bar .btn-row .btn { width: 100%; justify-content: center; }
  }
</style>
