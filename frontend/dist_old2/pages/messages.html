<style>
  /* ===== 顶部导航 ===== */
  .msgs-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: var(--space-lg) var(--space-lg) var(--space-md);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .msgs-header.scrolled {
    border-bottom-color: var(--border-light);
    box-shadow: var(--shadow-sm);
  }
  .msgs-header h2 {
    font-family: var(--font-display); font-size: 26px; font-weight: 800;
    letter-spacing: -0.02em;
  }
  .msgs-header h2 span { color: var(--accent); }

  .icon-btn {
    width: 40px; height: 40px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    background: transparent;
    border: none; cursor: pointer;
    transition: all 0.2s;
  }
  .icon-btn:hover {
    background: var(--border-light);
    color: var(--accent);
    transform: scale(1.05);
  }

  /* ===== 标签切换 ===== */
  .msg-tabs {
    display: flex; gap: 0; margin: 0 var(--space-lg) var(--space-md);
    background: var(--border-light); border-radius: var(--radius-md); padding: 4px;
  }
  .msg-tabs button {
    flex: 1; padding: 8px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; color: var(--muted);
    transition: all 0.2s;
    border: none; cursor: pointer;
    background: transparent;
  }
  .msg-tabs button.active {
    background: var(--surface); color: var(--fg); font-weight: 700;
    box-shadow: var(--shadow-sm);
  }

  /* ===== 内容区 ===== */
  .msg-list {
    padding: 0 var(--space-lg) calc(var(--bottom-nav-height) + var(--space-2xl));
    max-width: 640px; margin: 0 auto;
  }

  /* ===== 会话项 ===== */
  .conv-item {
    display: flex; align-items: center; gap: var(--space-md);
    padding: var(--space-lg) 0; border-bottom: 1px solid var(--border-light);
    cursor: pointer; transition: all 0.2s;
    border-radius: var(--radius-lg);
    margin: 0 -8px; padding-left: 12px; padding-right: 12px;
  }
  .conv-item:hover {
    background: var(--surface);
    transform: translateX(4px);
    box-shadow: var(--shadow-sm);
  }
  .conv-item.unread { position: relative; }
  .conv-item.unread::before {
    content: ''; position: absolute; left: -2px; top: 50%; transform: translateY(-50%);
    width: 4px; height: 40px; border-radius: var(--radius-full); background: var(--accent);
  }
  .conv-item .conv-avatar {
    position: relative; flex-shrink: 0;
  }
  .conv-item .conv-avatar .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 12px; height: 12px; border-radius: var(--radius-full);
    background: var(--success); border: 2.5px solid var(--surface);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
  }
  .conv-item .conv-body { flex: 1; min-width: 0; }
  .conv-item .conv-top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 4px;
  }
  .conv-item .conv-name {
    font-size: 15px; font-weight: 700; color: var(--fg);
  }
  .conv-item .conv-time {
    font-size: 12px; color: var(--muted); flex-shrink: 0; font-weight: 500;
  }
  .conv-item .conv-preview {
    font-size: 13px; color: var(--muted); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-item.unread .conv-preview {
    color: var(--fg); font-weight: 600;
  }
  .conv-item .conv-right { text-align: right; flex-shrink: 0; }
  .conv-item .unread-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; height: 20px; padding: 0 6px;
    border-radius: var(--radius-full); background: var(--danger);
    color: #fff; font-size: 11px; font-weight: 700;
    margin-top: 4px;
    box-shadow: 0 2px 6px rgba(239, 68, 68, 0.3);
  }
  .conv-item .pinned-icon {
    font-size: 12px; color: var(--accent); margin-right: 4px;
  }

  /* ===== 通知项 ===== */
  .notif-item {
    display: flex; gap: var(--space-md); padding: var(--space-lg);
    border-bottom: 1px solid var(--border-light); align-items: flex-start;
    transition: all 0.2s;
    border-radius: var(--radius-lg);
    margin: 0 -8px;
  }
  .notif-item:hover {
    background: var(--surface);
    transform: translateX(4px);
    box-shadow: var(--shadow-sm);
  }
  .notif-item .notif-icon {
    width: 40px; height: 40px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .notif-item .notif-body { flex: 1; min-width: 0; }
  .notif-item .notif-title {
    font-size: 14px; line-height: 1.6; color: var(--text-secondary);
  }
  .notif-item .notif-title strong { font-weight: 700; color: var(--fg); }
  .notif-item .notif-time {
    font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500;
  }

  /* ===== 聊天视图 ===== */
  .chat-view { display: none; flex-direction: column; height: 100dvh; }
  .chat-view.active { display: flex; }

  .chat-header {
    position: sticky; top: 0; z-index: 50;
    background: oklch(97% 0.005 85 / 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: var(--space-lg); display: flex; align-items: center; gap: var(--space-md);
    border-bottom: 1px solid var(--border-light);
  }
  .chat-header .back-btn {
    width: 36px; height: 36px; border-radius: var(--radius-full);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    color: var(--muted); border: none; background: transparent; cursor: pointer;
  }
  .chat-header .back-btn:hover {
    background: var(--border-light);
    color: var(--accent);
    transform: scale(1.05);
  }
  .chat-header .chat-partner { flex: 1; min-width: 0; }
  .chat-header .chat-partner .name { font-size: 16px; font-weight: 700; color: var(--fg); }
  .chat-header .chat-partner .status {
    font-size: 12px; color: var(--success); font-weight: 500;
  }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: var(--space-lg);
    display: flex; flex-direction: column; gap: var(--space-lg);
    scroll-behavior: smooth;
    max-width: 680px; margin: 0 auto; width: 100%;
  }

  .msg-bubble {
    max-width: 75%; display: flex; flex-direction: column; gap: 4px;
    animation: fadeInUp 0.3s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-bubble.incoming { align-self: flex-start; }
  .msg-bubble.outgoing { align-self: flex-end; align-items: flex-end; }
  .msg-bubble .bubble-content {
    padding: 12px 16px; border-radius: var(--radius-lg); font-size: 15px;
    line-height: 1.55; word-break: break-word;
  }
  .msg-bubble.incoming .bubble-content {
    background: var(--surface); border: 1.5px solid var(--border-light);
    color: var(--text-secondary);
    border-top-left-radius: 4px;
  }
  .msg-bubble.outgoing .bubble-content {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    border-top-right-radius: 4px;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
  }
  .msg-bubble .bubble-time {
    font-size: 11px; color: var(--muted); padding: 0 4px; font-weight: 500;
  }
  .msg-date-divider {
    text-align: center; font-size: 12px; color: var(--muted);
    padding: var(--space-sm) 0; font-weight: 500;
  }

  /* 聊天输入栏 */
  .chat-input-bar {
    position: sticky; bottom: 0; z-index: 50;
    background: var(--surface); border-top: 1px solid var(--border-light);
    padding: var(--space-md) var(--space-lg) calc(var(--space-md) + env(safe-area-inset-bottom, 0));
    display: flex; align-items: flex-end; gap: var(--space-sm);
    max-width: 680px; margin: 0 auto; width: 100%;
  }
  .chat-input-bar textarea {
    flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-xl);
    padding: 10px 16px; font-size: 15px; line-height: 1.45; outline: none;
    resize: none; max-height: 120px; background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit; color: var(--fg);
  }
  .chat-input-bar textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }
  .chat-input-bar textarea::placeholder { color: var(--muted); }
  .chat-input-bar .send-btn {
    width: 44px; height: 44px; border-radius: var(--radius-full);
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    border: none; cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
  }
  .chat-input-bar .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
  }
  .chat-input-bar .send-btn:active { transform: scale(0.94); }
  .chat-input-bar .send-btn svg { width: 20px; height: 20px; }

  /* ===== 空状态 ===== */
  .notif-empty {
    text-align: center; padding: var(--space-4xl) var(--space-xl); color: var(--muted);
  }
  .notif-empty svg { width: 56px; height: 56px; opacity: 0.25; margin-bottom: var(--space-lg); }

  /* ===== 通用 ===== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .conv-list-view { display: block; }
  .conv-list-view.hidden { display: none; }

  .divider {
    height: 1px; background: var(--border-light); margin: var(--space-md) var(--space-lg);
  }

  /* ===== AI FAB ===== */
  .ai-fab {
    position: fixed; right: 20px; bottom: calc(80px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    z-index: 90; transition: transform 0.3s, box-shadow 0.3s;
  }
  .ai-fab:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45);
  }
  .ai-fab svg { width: 24px; height: 24px; }
  .fab-pulse {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    animation: fabPulse 2s ease-out infinite;
  }
  @keyframes fabPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ===== 底部导航 ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: oklch(98% 0.005 85 / 0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border-light);
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottom-nav a {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    transition: color 0.2s; padding: 4px 12px; text-decoration: none;
  }
  .bottom-nav a svg { width: 22px; height: 22px; transition: transform 0.2s; }
  .bottom-nav a:hover { color: var(--accent); }
  .bottom-nav a:hover svg { transform: translateY(-2px); }
  .bottom-nav a.active { color: var(--accent); }
  .bottom-nav a.active svg { transform: translateY(-2px); }

  .publish-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff !important;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    margin-top: -24px; transition: transform 0.2s, box-shadow 0.2s;
  }
  .publish-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
  }
  .publish-btn svg { width: 24px; height: 24px; }

  /* 响应式 */
  @media (max-width: 480px) {
    .msgs-header { padding: var(--space-md) var(--space-md) var(--space-sm); }
    .msg-list { padding: 0 var(--space-md) calc(var(--bottom-nav-height) + var(--space-2xl)); }
    .msg-tabs { margin: 0 var(--space-md) var(--space-sm); }
  }
</style>
